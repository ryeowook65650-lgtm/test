<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Couple Expense Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fefeea">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. 現代原生 App 變數設定 (您指定的質感色票)
           ========================================= */
        :root {
            --bg-color: #fefeea;       /* 鵝黃色 (背景) */
            --card-bg: #FFFFFF;        /* 純白 (卡片) */
            --primary: #548c92;        /* 深青色 (主色調、按鈕) */
            --primary-light: #b4d7d8;  /* 淺青色 (選取狀態、副色) */
            --secondary: #e0d7cf;      /* 暖灰/奶茶色 (分頁背景、邊框) */
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --border-color: rgba(224, 215, 207, 0.6); 
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            
            --shadow-card: 0 8px 24px rgba(84, 140, 146, 0.08); /* 配合主色的柔和陰影 */
            --shadow-btn: 0 4px 12px rgba(84, 140, 146, 0.3);
            
            --font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-family); }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            padding-bottom: calc(40px + env(safe-area-inset-bottom));
            overscroll-behavior-y: none;
        }

        button, input, select { appearance: none; -webkit-appearance: none; border: none; background: none; outline: none; margin: 0; padding: 0; }
        button { cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* =========================================
           2. 頂部狀態列 (Header)
           ========================================= */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(254, 254, 234, 0.85); /* 配合鵝黃背景的毛玻璃 */
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: calc(16px + env(safe-area-inset-top)) 24px 16px;
            display: flex; justify-content: space-between; align-items: flex-end;
        }
        .app-header h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .app-header .subtitle { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; display: block; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .refresh-fab { background: var(--card-bg); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-card); color: var(--primary); font-size: 18px; }

        /* =========================================
           3. 視圖容器
           ========================================= */
        .view-container { display: block; padding: 0 20px; animation: fadeIn 0.3s ease forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           4. 記帳版面 (Bento Box 網格佈局)
           ========================================= */
        .balance-card {
            background: linear-gradient(135deg, #6ba5ab 0%, var(--primary) 100%);
            border-radius: var(--radius-lg); padding: 24px; color: #FFF; margin-top: 10px; margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(84, 140, 146, 0.25); position: relative; overflow: hidden;
        }
        .balance-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.08); border-radius: 50%; pointer-events: none;}
        
        .b-title { font-size: 13px; font-weight: 600; opacity: 0.9; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; position: relative; z-index: 2;}
        .b-title-right { display: flex; align-items: center; gap: 8px; }
        
        .stats-btn { background: rgba(255,255,255,0.2); border-radius: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; color: #FFF; font-size: 16px; backdrop-filter: blur(5px); transition: 0.2s; }
        .stats-btn:active { background: rgba(255,255,255,0.4); transform: scale(0.9); }

        .b-amount { font-size: 40px; font-weight: 800; margin: 0 0 4px; letter-spacing: -1px; position: relative; z-index: 2;}
        .b-sub { font-size: 15px; opacity: 0.9; font-weight: 600; position: relative; z-index: 2;}

        /* 預算進度條 */
        .budget-wrapper { margin-top: 20px; position: relative; z-index: 2; }
        .budget-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; margin-bottom: 8px; opacity: 0.95; }
        .budget-tot { opacity: 0.8; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s;}
        .budget-tot:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .budget-track { height: 6px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);}
        .budget-fill { height: 100%; width: 0%; background: var(--bg-color); border-radius: 99px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease; }

        .segment-wrapper { background: var(--secondary); border-radius: 12px; display: flex; padding: 4px; margin-bottom: 20px; }
        .seg-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 600; color: #7a7067; border-radius: 8px; transition: 0.2s; }
        .seg-btn.active { background: #FFF; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        /* 日期選擇器樣式 */
        .date-picker-wrapper { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 20px; box-shadow: var(--shadow-card); display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); }
        .date-picker-wrapper input { font-size: 16px; font-weight: 600; color: var(--text-main); width: 100%; background: transparent; }

        .section-title { font-size: 15px; font-weight: 800; margin: 0 0 12px; color: var(--text-main); }
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .bento-box { background: var(--card-bg); border-radius: var(--radius-md); padding: 16px; text-align: center; border: 2px solid transparent; box-shadow: var(--shadow-card); transition: 0.2s; }
        .bento-box.active { border-color: var(--primary); background: rgba(180, 215, 216, 0.2); } /* 淡化淺青色背景 */
        .bento-icon { font-size: 32px; display: block; margin-bottom: 8px; color: var(--text-main); }
        .bento-box.active .bento-icon { color: var(--primary); }
        .bento-label { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .bento-box.active .bento-label { color: var(--primary); }

        .input-composite { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); margin-bottom: 30px; border: 1px solid var(--border-color); }
        .input-row { display: flex; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 12px; }
        .input-row input { flex: 1; font-size: 16px; font-weight: 600; padding: 8px; color: var(--text-main); }
        .input-row input::placeholder { color: #C7C7CC; }
        
        .price-action-row { display: flex; align-items: center; justify-content: space-between; }
        .price-input-wrapper { display: flex; align-items: center; background: rgba(224, 215, 207, 0.3); border-radius: 12px; padding: 12px 16px; flex: 1; margin-right: 12px; }
        .curr-toggle { font-weight: 800; font-size: 20px; color: var(--primary); margin-right: 12px; padding-right: 12px; border-right: 2px solid #D1D1D6; user-select: none; }
        .price-input-wrapper input { font-size: 24px; font-weight: 800; width: 100%; color: var(--primary); }
        .price-input-wrapper input::placeholder { color: #C7C7CC; font-weight: 600; font-size: 18px; }
        .submit-fab { width: 54px; height: 54px; border-radius: 16px; background: var(--primary); color: #FFF; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-btn); flex-shrink: 0;}

        .history-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px;}
        .h-item { background: var(--card-bg); padding: 16px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .h-left { display: flex; align-items: center; gap: 12px; }
        .h-icon { width: 44px; height: 44px; background: rgba(224, 215, 207, 0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--primary); }
        .h-info h4 { margin: 0 0 4px; font-size: 15px; font-weight: 600; color: var(--text-main); }
        .h-tag { font-size: 10px; background: var(--primary-light); padding: 3px 6px; border-radius: 4px; font-weight: 800; color: #2c4d51; }
        .h-right { text-align: right; }
        .h-price { font-size: 17px; font-weight: 800; color: var(--primary); margin-bottom: 2px; }
        .h-cat { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .h-del { color: #FF3B30; padding: 10px; margin-left: 5px; font-size: 20px; cursor: pointer; border: none; background: none;}

        /* Modal / Toast */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px); z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; display: flex; align-items: flex-end; }
        .modal-overlay.active { opacity: 1; pointer-events: all; }
        .modal-card { background: var(--bg-color); width: 100%; max-height: 85vh; overflow-y: auto; border-radius: 24px 24px 0 0; padding: 24px; padding-bottom: calc(24px + env(safe-area-inset-bottom)); transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1); }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        
        .pull-indicator { width: 40px; height: 5px; background: var(--secondary); border-radius: 3px; margin: 0 auto 16px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .modal-header h3 { margin: 0; font-size: 20px; font-weight: 800; color: var(--primary); }
        .close-btn { background: var(--secondary); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; color: var(--text-main); font-size: 16px; cursor: pointer; border: none;}
        
        .stat-item { background: var(--card-bg); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .stat-left { display: flex; align-items: center; gap: 12px; }
        .stat-icon { width: 44px; height: 44px; background: rgba(180, 215, 216, 0.3); color: var(--primary); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        .stat-info h4 { margin: 0 0 4px; font-size: 15px; font-weight: 600; color: var(--text-main); }
        .stat-percent { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .stat-right { text-align: right; }
        .s-twd { font-size: 17px; font-weight: 800; color: var(--primary); display: block;}

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; pointer-events: none;}
        .toast { background: rgba(84, 140, 146, 0.95); backdrop-filter: blur(10px); color: #FFF; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; animation: toastIn 0.3s forwards; }
        .toast.error { background: rgba(211, 47, 47, 0.95); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div>
            <h1>噗噗記帳本</h1>
            <span class="subtitle">專屬理財小天地</span>
        </div>
        <div class="header-actions">
            <button class="refresh-fab" onclick="manualSync()">
                <i class="ph-bold ph-arrows-clockwise"></i>
            </button>
        </div>
    </header>

    <main>
        <section id="view-accounting" class="view-container">
            
            <div class="balance-card">
                <div class="b-title">
                    <span>當月總計花費</span>
                    <div class="b-title-right">
                        <button class="stats-btn" onclick="openStatsModal()">
                            <i class="ph-bold ph-chart-pie-slice"></i>
                        </button>
                    </div>
                </div>
                <h2 class="b-amount" id="total-primary">NT$ 0</h2>
                <div class="b-sub" id="total-secondary">以選取日期的月份計算</div>

                <div class="budget-wrapper">
                    <div class="budget-info">
                        <span id="budget-rem-label">剩餘 NT$ 15,000</span>
                        <span class="budget-tot" onclick="editBudget()">
                            <span id="budget-total-label">/ 15k 每月預算</span>
                            <i class="ph-bold ph-pencil-simple"></i>
                        </span>
                    </div>
                    <div class="budget-track">
                        <div class="budget-fill" id="budget-fill"></div>
                    </div>
                </div>
            </div>

            <div class="date-picker-wrapper">
                <input type="date" id="expense-date">
            </div>

            <div class="segment-wrapper" id="person-segment">
                <button class="seg-btn active" onclick="selectPerson('', this)">👥 噗噗</button>
                <button class="seg-btn" onclick="selectPerson('廖噗', this)">👩🏻 廖噗</button>
                <button class="seg-btn" onclick="selectPerson('陳噗', this)">👦🏻 陳噗</button>
            </div>

            <h3 class="section-title">選擇分類</h3>
            <div class="bento-grid" id="category-container">
                <button class="bento-box active" onclick="selectCategory('交通', this)">
                    <i class="ph-fill ph-train bento-icon"></i>
                    <span class="bento-label">交通</span>
                </button>
                <button class="bento-box" onclick="selectCategory('食物', this)">
                    <i class="ph-fill ph-hamburger bento-icon"></i>
                    <span class="bento-label">食物</span>
                </button>
                <button class="bento-box" onclick="selectCategory('購物', this)">
                    <i class="ph-fill ph-shopping-bag bento-icon"></i>
                    <span class="bento-label">購物</span>
                </button>
                <button class="bento-box" onclick="selectCategory('其他', this)">
                    <i class="ph-fill ph-ticket bento-icon"></i>
                    <span class="bento-label">其他</span>
                </button>
            </div>

            <h3 class="section-title">記下一筆</h3>
            <div class="input-composite">
                <div class="input-row">
                    <input type="text" id="item-name" placeholder="品項名稱 (選填)">
                </div>

                <div class="price-action-row">
                    <div class="price-input-wrapper">
                        <div class="curr-toggle">$</div>
                        <input type="number" id="item-price" placeholder="輸入金額" min="0" step="1">
                    </div>
                    <button class="submit-fab" onclick="addExpense()"><i class="ph-bold ph-plus"></i></button>
                </div>
            </div>

            <h3 class="section-title">本日紀錄</h3>
            <div id="expense-list" class="history-list"></div>
        </section>
    </main>

    <div class="modal-overlay" id="stats-modal" onclick="closeStatsModal()">
        <div class="modal-card" onclick="event.stopPropagation()">
            <div class="pull-indicator"></div>
            <div class="modal-header">
                <h3>當月分類統計</h3>
                <button onclick="closeStatsModal()" class="close-btn"><i class="ph-bold ph-x"></i></button>
            </div>
            <div id="stats-content"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9QRzDsOKhw89lgS03-oOhGpUcfd6szO3-QZ78w_6Mpz18rLnszsFHNyyfzEJntg1m/exec';

        function getSafeStorage(key, defaultVal) {
            try {
                const val = localStorage.getItem(key);
                return val ? JSON.parse(val) : defaultVal;
            } catch (e) {
                console.error("Storage Error:", e);
                return defaultVal;
            }
        }

        const Store = {
            state: {
                expenses: getSafeStorage('cached_expenses', []),
                budget: parseInt(localStorage.getItem('monthly_budget')) || 15000,
                date: '',
                person: '',     
                category: '交通'
            },
            updateExpenses(newData) {
                this.state.expenses = newData;
                localStorage.setItem('cached_expenses', JSON.stringify(newData));
            }
        };

        const EMOJI_MAP = { '交通': 'ph-train', '食物': 'ph-hamburger', '購物': 'ph-shopping-bag', '其他': 'ph-ticket' };

        document.addEventListener('DOMContentLoaded', () => {
            // 初始化日期選擇器為今天
            const dateInput = document.getElementById('expense-date');
            const today = new Date();
            const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            dateInput.value = localDate;
            Store.state.date = localDate;

            // 監聽日期變更
            dateInput.addEventListener('change', (e) => {
                Store.state.date = e.target.value;
                renderExpenses();
            });
            
            try {
                renderExpenses();
                if (navigator.onLine) fetchExpenses();
            } catch (e) {
                console.error(e);
            }
        });

        function selectPerson(person, el) {
            Store.state.person = person;
            document.querySelectorAll('#person-segment .seg-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function selectCategory(cat, el) {
            Store.state.category = cat;
            document.querySelectorAll('.bento-box').forEach(box => box.classList.remove('active'));
            el.classList.add('active');
        }

        function editBudget() {
            const current = Store.state.budget;
            const input = prompt("請輸入您的每月預算金額：", current);
            if (input !== null) {
                const num = parseInt(input.replace(/[^\d]/g, ''), 10);
                if (!isNaN(num) && num > 0) {
                    Store.state.budget = num;
                    localStorage.setItem('monthly_budget', num);
                    renderExpenses();
                    showToast('預算已更新');
                } else {
                    showToast('請輸入有效數字', 'error');
                }
            }
        }

        function manualSync() {
            showToast('正在同步資料...', 'success');
            fetchExpenses();
        }

        // Modal 統計現在也依照「當月」去計算
        function openStatsModal() {
            const targetDateObj = new Date(Store.state.date);
            const targetY = targetDateObj.getFullYear();
            const targetM = targetDateObj.getMonth() + 1;

            const container = document.getElementById('stats-content');
            let stats = { '交通': 0, '食物': 0, '購物': 0, '其他': 0 };
            let totalTWD = 0;
            
            Store.state.expenses.forEach(item => {
                const sheetDate = String(item.date).trim();
                let isSameMonth = false;
                if (sheetDate.includes('-') || sheetDate.includes('/')) {
                    const itemDateObj = new Date(sheetDate);
                    if(!isNaN(itemDateObj.getTime())) {
                        isSameMonth = (itemDateObj.getFullYear() === targetY && itemDateObj.getMonth() + 1 === targetM);
                    }
                } else if (sheetDate === Store.state.date) {
                    isSameMonth = true;
                }

                if (isSameMonth) {
                    let price = Math.round(parseFloat(item.price) || 0);
                    stats[item.cat] = (stats[item.cat] || 0) + price;
                    totalTWD += price;
                }
            });

            let html = '';
            const cats = ['交通', '食物', '購物', '其他'];
            cats.forEach(cat => {
                let valTWD = stats[cat];
                let icon = EMOJI_MAP[cat] || 'ph-ticket';
                let percent = totalTWD === 0 ? 0 : Math.round((valTWD / totalTWD) * 100);
                
                html += `
                <div class="stat-item">
                    <div class="stat-left">
                        <div class="stat-icon"><i class="ph-fill ${icon}"></i></div>
                        <div class="stat-info">
                            <h4>${cat}</h4>
                            <span class="stat-percent">${percent}% 佔比</span>
                        </div>
                    </div>
                    <div class="stat-right">
                        <span class="s-twd">$${valTWD.toLocaleString()}</span>
                    </div>
                </div>`;
            });
            
            container.innerHTML = html;
            document.getElementById('stats-modal').classList.add('active');
        }

        function closeStatsModal() {
            document.getElementById('stats-modal').classList.remove('active');
        }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> <span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => {
                toast.classList.add('hide');
                setTimeout(() => toast.remove(), 300);
            }, 2500);
        }

        function renderExpenses() {
            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';
            
            // 解析目前選取的日期
            const targetDateObj = new Date(Store.state.date);
            const targetY = targetDateObj.getFullYear();
            const targetM = targetDateObj.getMonth() + 1;
            const targetD = targetDateObj.getDate();
            const targetShortDate = `${targetM}/${targetD}`; 

            let monthlyTotal = 0;
            const selectedDayItems = [];

            // 同時計算「當天花費紀錄」與「當月總計金額」
            Store.state.expenses.forEach(item => {
                const sheetDate = String(item.date).trim();
                let isSameMonth = false;
                let isSameDay = false;
                
                if (sheetDate.includes('T') || sheetDate.includes('-') || sheetDate.includes('/')) {
                    const d = new Date(sheetDate);
                    if(!isNaN(d.getTime())) {
                        isSameMonth = (d.getFullYear() === targetY && d.getMonth() + 1 === targetM);
                        isSameDay = (isSameMonth && d.getDate() === targetD);
                    } else if (sheetDate === targetShortDate || sheetDate.includes(targetShortDate)) {
                        isSameDay = true;
                        isSameMonth = true;
                    }
                } else if (sheetDate === Store.state.date) {
                    isSameDay = true;
                    isSameMonth = true;
                }

                const price = Math.round(parseFloat(item.price) || 0);

                if (isSameMonth) monthlyTotal += price;
                if (isSameDay) selectedDayItems.push(item);
            });

            if (selectedDayItems.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-weight:600;">本日尚無紀錄</div>`;
            } else {
                selectedDayItems.forEach(item => {
                    const price = Math.round(parseFloat(item.price));
                    const safeName = String(item.name).replace(/[<>]/g, "");
                    const icon = EMOJI_MAP[item.cat] || 'ph-ticket';
                    
                    let personTagHtml = '';
                    let displayName = safeName;
                    const tagMatch = safeName.match(/^【(.*?)】(.*)/);
                    if (tagMatch) {
                        personTagHtml = `<span class="h-tag">${tagMatch[1]}</span>`;
                        displayName = tagMatch[2].trim();
                    }

                    listEl.innerHTML += `
                    <div class="h-item">
                        <div class="h-left">
                            <div class="h-icon"><i class="ph-fill ${icon}"></i></div>
                            <div class="h-info">
                                <h4>${displayName} ${personTagHtml}</h4>
                                <span class="h-cat">${item.cat}</span>
                            </div>
                        </div>
                        <div class="h-right">
                            <div class="h-price">$${price}</div>
                            <button class="h-del" onclick="deleteExpense('${item.id}')"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>`;
                });
            }
            
            // 更新上方總金額卡片與進度條
            document.getElementById('total-primary').innerText = `NT$ ${monthlyTotal.toLocaleString()}`;
            
            let currentBudget = Store.state.budget;
            document.getElementById('budget-total-label').innerText = `/ ${(currentBudget/1000).toFixed(1).replace('.0','')}k 每月預算`;

            let spentPercent = (monthlyTotal / currentBudget) * 100;
            let remaining = currentBudget - monthlyTotal;
            const fillEl = document.getElementById('budget-fill');
            const remLabel = document.getElementById('budget-rem-label');

            fillEl.style.width = `${Math.min(spentPercent, 100)}%`;

            if (remaining >= 0) {
                remLabel.innerText = `剩餘 NT$ ${remaining.toLocaleString()}`;
                remLabel.style.color = 'rgba(255,255,255,0.95)';
                fillEl.style.background = spentPercent > 85 ? '#e0d7cf' : 'var(--bg-color)'; 
            } else {
                remLabel.innerText = `超支 NT$ ${Math.abs(remaining).toLocaleString()}`;
                remLabel.style.color = '#ffb3b3'; // 柔和的紅色警示
                fillEl.style.background = '#ffb3b3';
            }
        }

        async function fetchExpenses() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const freshData = await res.json();
                if (Array.isArray(freshData)) {
                    Store.updateExpenses(freshData);
                    renderExpenses();
                }
            } catch (err) { console.error("Fetch Data Error:", err); }
        }

        async function addExpense() {
            const nameEl = document.getElementById('item-name');
            const priceEl = document.getElementById('item-price');
            const inputPrice = parseFloat(priceEl.value); 
            
            if (isNaN(inputPrice) || inputPrice <= 0) return showToast('請輸入有效金額', 'error'); 
            
            let baseName = nameEl.value.trim() || Store.state.category;
            let finalName = Store.state.person ? `【${Store.state.person}】${baseName}` : baseName;
            
            const newId = Date.now().toString();
            // 存入時格式統一為 YYYY-MM-DD
            const newExpenseObj = { id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: Math.round(inputPrice) };
            
            Store.updateExpenses([...Store.state.expenses, newExpenseObj]);
            renderExpenses();
            
            nameEl.value = ''; priceEl.value = ''; priceEl.blur(); 
            showToast(`已新增一筆花費`);

            try {
                const params = new URLSearchParams({ action: 'add', ...newExpenseObj });
                await fetch(SCRIPT_URL, { method: 'POST', body: params });
                fetchExpenses();
            } catch (err) { showToast('背景同步失敗，已存於本機', 'error'); }
        }

        async function deleteExpense(id) {
            if (!confirm('確定刪除此筆紀錄？')) return;
            const original = [...Store.state.expenses]; 
            Store.updateExpenses(Store.state.expenses.filter(item => String(item.id) !== String(id)));
            renderExpenses(); 

            try { 
                await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'delete', id: String(id) }) }); 
                showToast('紀錄已刪除');
                fetchExpenses();
            } catch (err) { 
                Store.updateExpenses(original); renderExpenses(); 
                showToast('刪除失敗', 'error');
            }
        }
    </script>
</body>
</html>
