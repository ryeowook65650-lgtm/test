<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Couple Expense Tracker</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#fefeea">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Noto+Sans+TC:wght@400;600;800&display=swap" rel="stylesheet">
    
    <script src="https://unpkg.com/@phosphor-icons/web"></script>

    <style>
        /* =========================================
           1. 現代原生 App 變數設定 (莫蘭迪色票)
           ========================================= */
        :root {
            --bg-color: #fefeea;       
            --card-bg: #FFFFFF;        
            --primary: #548c92;        
            --primary-light: #b4d7d8;  
            --secondary: #e0d7cf;      
            --text-main: #1C1C1E;
            --text-muted: #8E8E93;
            --border-color: rgba(224, 215, 207, 0.6); 
            --income-color: #4CAF50; 
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            
            --shadow-card: 0 8px 24px rgba(84, 140, 146, 0.08); 
            --shadow-btn: 0 4px 12px rgba(84, 140, 146, 0.3);
            
            --font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-family); }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
            overscroll-behavior-y: none;
        }

        button, input, select { appearance: none; -webkit-appearance: none; border: none; background: none; outline: none; margin: 0; padding: 0; }
        button { cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        /* =========================================
           2. 頂部狀態列 (Header)
           ========================================= */
        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(254, 254, 234, 0.85); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: calc(16px + env(safe-area-inset-top)) 24px 16px;
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(84, 140, 146, 0.05);
        }
        .app-header h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--primary); letter-spacing: -0.5px; }
        .app-header .subtitle { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; display: block; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .refresh-fab { background: var(--card-bg); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-card); color: var(--primary); font-size: 18px; }

        /* =========================================
           3. 底部導覽列 (Bottom Tab Bar)
           ========================================= */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(254, 254, 234, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(84, 140, 146, 0.1); z-index: 999;
            display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
        }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #a1a1a6; }
        .tab-btn i { font-size: 26px; transition: 0.2s; }
        .tab-btn span { font-size: 11px; font-weight: 800; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active i { transform: translateY(-2px); }

        /* =========================================
           4. 視圖容器 (Pages)
           ========================================= */
        .view-container { display: none; padding: 0 20px; animation: fadeIn 0.3s ease forwards; }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* =========================================
           5. 卡片與共用元件
           ========================================= */
        .balance-card {
            background: linear-gradient(135deg, #6ba5ab 0%, var(--primary) 100%);
            border-radius: var(--radius-lg); padding: 24px; color: #FFF; margin-top: 10px; margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(84, 140, 146, 0.25); position: relative; overflow: hidden;
        }
        .balance-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.08); border-radius: 50%; pointer-events: none;}
        
        .b-title { font-size: 13px; font-weight: 600; opacity: 0.9; margin-bottom: 8px; display: flex; justify-content: space-between; position: relative; z-index: 2; }
        .b-amount { font-size: 40px; font-weight: 800; margin: 0 0 4px; letter-spacing: -1px; position: relative; z-index: 2;}

        .budget-wrapper { margin-top: 16px; position: relative; z-index: 2; }
        .budget-info { display: flex; justify-content: space-between; align-items: center; font-size: 12px; font-weight: 600; margin-bottom: 8px; opacity: 0.95; }
        .budget-tot { opacity: 0.8; display: flex; align-items: center; gap: 4px; background: rgba(255,255,255,0.15); padding: 4px 8px; border-radius: 8px; cursor: pointer; backdrop-filter: blur(4px); transition: 0.2s;}
        .budget-tot:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .budget-track { height: 6px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1);}
        .budget-fill { height: 100%; width: 0%; background: var(--bg-color); border-radius: 99px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease; }

        .personal-totals { display: flex; justify-content: space-between; margin-top: 20px; padding-top: 16px; border-top: 1px solid rgba(255,255,255,0.2); position: relative; z-index: 2; }
        .p-tot { display: flex; flex-direction: column; gap: 4px; }
        .p-tot span { font-size: 11px; opacity: 0.9; font-weight: 600; }
        .p-tot strong { font-size: 18px; font-weight: 800; }

        .date-picker-wrapper { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 16px; box-shadow: var(--shadow-card); display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); }
        .date-picker-wrapper input { font-size: 16px; font-weight: 600; color: var(--text-main); width: 100%; background: transparent; }

        .type-segment { display: flex; gap: 8px; margin-bottom: 20px; }
        .type-btn { flex: 1; text-align: center; padding: 12px 0; font-size: 15px; font-weight: 800; border-radius: 12px; transition: all 0.3s ease; background: var(--secondary); color: #7a7067; border: 2px solid transparent;}
        .type-btn.active.expense { background: var(--card-bg) !important; color: var(--primary) !important; border-color: var(--primary) !important; box-shadow: var(--shadow-card); }
        .type-btn.active.income { background: var(--card-bg) !important; color: var(--income-color) !important; border-color: var(--income-color) !important; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.2); }

        .segment-wrapper { background: var(--secondary); border-radius: 12px; display: flex; padding: 4px; margin-bottom: 20px; }
        .seg-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 14px; font-weight: 600; color: #7a7067; border-radius: 8px; transition: 0.2s; }
        .seg-btn.active { background: #FFF; color: var(--primary); box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

        .payer-segment { display: none; align-items: center; gap: 12px; margin-top: -10px; margin-bottom: 20px; background: rgba(224, 215, 207, 0.3); padding: 8px 12px; border-radius: 12px; border: 1px dashed rgba(84, 140, 146, 0.3); animation: fadeIn 0.3s ease forwards; }
        .payer-segment.active { display: flex; }
        .payer-segment span { font-size: 13px; font-weight: 800; color: var(--primary); flex-shrink: 0; }

        .section-title { font-size: 15px; font-weight: 800; margin: 0 0 12px; color: var(--text-main); }
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .bento-box { background: var(--card-bg); border-radius: var(--radius-md); padding: 16px; text-align: center; border: 2px solid transparent; box-shadow: var(--shadow-card); transition: 0.2s; }
        .bento-box.active { border-color: var(--primary); background: rgba(180, 215, 216, 0.2); }
        .bento-box.active.income-cat { border-color: var(--income-color); background: rgba(76, 175, 80, 0.1); }
        .bento-icon { font-size: 32px; display: block; margin-bottom: 8px; color: var(--text-main); }
        .bento-box.active .bento-icon { color: var(--primary); }
        .bento-box.active.income-cat .bento-icon { color: var(--income-color); }
        .bento-label { font-size: 14px; font-weight: 600; color: var(--text-main); }
        .bento-box.active .bento-label { color: var(--primary); }
        .bento-box.active.income-cat .bento-label { color: var(--income-color); }

        .input-composite { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); margin-bottom: 30px; border: 1px solid var(--border-color); }
        .input-row { display: flex; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 12px; }
        .input-row input { flex: 1; font-size: 16px; font-weight: 600; padding: 8px; color: var(--text-main); }
        .input-row input::placeholder { color: #C7C7CC; }
        
        .price-action-row { display: flex; align-items: center; justify-content: space-between; }
        .price-input-wrapper { display: flex; align-items: center; background: rgba(224, 215, 207, 0.3); border-radius: 12px; padding: 12px 16px; flex: 1; margin-right: 12px; transition: 0.3s;}
        .curr-toggle { font-weight: 800; font-size: 20px; color: var(--primary); margin-right: 12px; padding-right: 12px; border-right: 2px solid #D1D1D6; user-select: none; transition: 0.3s;}
        .price-input-wrapper input { font-size: 24px; font-weight: 800; width: 100%; color: var(--primary); transition: 0.3s;}
        .price-input-wrapper input::placeholder { color: #C7C7CC; font-weight: 600; font-size: 18px; }
        .submit-fab { width: 54px; height: 54px; border-radius: 16px; background: var(--primary); color: #FFF; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-btn); flex-shrink: 0; transition: 0.3s;}

        .history-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px;}
        .h-item { background: var(--card-bg); padding: 16px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .h-left { display: flex; align-items: center; gap: 12px; }
        .h-icon { width: 44px; height: 44px; background: rgba(224, 215, 207, 0.4); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--primary); }
        .h-icon.inc { background: rgba(76, 175, 80, 0.1); color: var(--income-color); }
        .h-icon.settled { background: #d4edda; color: #155724; }
        .h-info h4 { margin: 0 0 4px; font-size: 15px; font-weight: 600; color: var(--text-main); }
        .h-tag { font-size: 11px; background: var(--primary-light); padding: 3px 6px; border-radius: 4px; font-weight: 800; color: #2c4d51; margin-left: 6px; display: inline-block;}
        .h-tag.shared { background: #ffe4b5; color: #d97706; } 
        .h-tag.alert { background: #f8d7da; color: #721c24; } 
        .h-tag.settled { background: #d4edda; color: #155724; } 
        .h-right { text-align: right; }
        .h-price { font-size: 17px; font-weight: 800; color: var(--primary); margin-bottom: 2px; }
        .h-price.inc { color: var(--income-color); }
        .h-price.settled { color: #155724; }
        .h-cat { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .h-del { color: #FF3B30; padding: 10px; margin-left: 5px; font-size: 20px; cursor: pointer; border: none; background: none;}

        .dash-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .dash-card { background: var(--card-bg); padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .dash-card.full { grid-column: span 2; background: linear-gradient(135deg, #FFF 0%, #fefeea 100%); text-align: center; border: 2px solid rgba(84, 140, 146, 0.2);}
        .dc-title { font-size: 13px; color: var(--text-muted); font-weight: 800; margin-bottom: 8px; display: block; }
        .dc-val { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .dc-val.exp { color: var(--primary); }
        .dc-val.net { font-size: 24px; color: var(--primary); margin: 8px 0; line-height: 1.4; }
        
        .btn-settle { background: var(--income-color); color: #FFF; border-radius: 12px; padding: 12px 20px; font-size: 15px; font-weight: 800; width: 100%; margin-top: 12px; border: none; box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); transition: 0.2s;}
        .btn-settle:active { transform: scale(0.95); opacity: 0.8; }

        .chart-section { background: var(--card-bg); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border-color); margin-bottom: 24px; }
        .chart-row { margin-bottom: 16px; }
        .chart-row:last-child { margin-bottom: 0; }
        .cr-top { display: flex; justify-content: space-between; font-size: 13px; font-weight: 600; margin-bottom: 6px; }
        .cr-name { display: flex; align-items: center; gap: 6px; color: var(--text-main); }
        .cr-val { color: var(--text-muted); }
        .cr-track { height: 8px; background: rgba(224, 215, 207, 0.5); border-radius: 4px; overflow: hidden; }
        .cr-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.8s ease; }
        .cr-fill.p1 { background: #548c92; } 
        .cr-fill.p2 { background: #b4d7d8; } 

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; pointer-events: none;}
        .toast { background: rgba(84, 140, 146, 0.95); backdrop-filter: blur(10px); color: #FFF; padding: 14px 20px; border-radius: 12px; font-size: 14px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.15); display: flex; align-items: center; gap: 12px; animation: toastIn 0.3s forwards; }
        .toast.error { background: rgba(211, 47, 47, 0.95); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div>
            <h1 id="header-title">噗噗記帳本</h1>
            <span class="subtitle">專屬理財小天地</span>
        </div>
        <div class="header-actions">
            <button class="refresh-fab" onclick="manualSync()">
                <i class="ph-bold ph-arrows-clockwise"></i>
            </button>
        </div>
    </header>

    <main>
        <section id="view-accounting" class="view-container active">
            
            <div class="balance-card">
                <div class="b-title">
                    <span>當月共用花費 (噗噗)</span>
                    <span style="font-weight: 400; opacity: 0.8;">依選取月份計算</span>
                </div>
                <h2 class="b-amount" id="total-shared">NT$ 0</h2>

                <div class="budget-wrapper">
                    <div class="budget-info">
                        <span id="budget-rem-label">剩餘 NT$ 15,000</span>
                        <span class="budget-tot" onclick="editBudget()">
                            <span id="budget-total-label">/ 15k 預算</span>
                            <i class="ph-bold ph-pencil-simple"></i>
                        </span>
                    </div>
                    <div class="budget-track">
                        <div class="budget-fill" id="budget-fill"></div>
                    </div>
                </div>

                <div class="personal-totals">
                    <div class="p-tot">
                        <span>👩🏻 廖噗 (含共用均分)</span>
                        <strong id="total-p2">$0</strong>
                    </div>
                    <div class="p-tot">
                        <span>👦🏻 陳噗 (含共用均分)</span>
                        <strong id="total-p3">$0</strong>
                    </div>
                </div>
            </div>

            <div class="date-picker-wrapper">
                <input type="date" id="expense-date">
            </div>

            <div class="type-segment">
                <button class="type-btn active expense" id="btn-type-exp" onclick="setRecordType('expense')">支出</button>
                <button class="type-btn income" id="btn-type-inc" onclick="setRecordType('income')">收入</button>
            </div>

            <div class="segment-wrapper" id="person-segment">
                <button class="seg-btn active" id="btn-person-shared" onclick="selectPerson('噗噗', this)">👥 共用</button>
                <button class="seg-btn" id="btn-person-liao" onclick="selectPerson('廖噗', this)">👩🏻 廖噗</button>
                <button class="seg-btn" id="btn-person-chen" onclick="selectPerson('陳噗', this)">👦🏻 陳噗</button>
            </div>

            <div class="payer-segment active" id="payer-container">
                <span>由誰付錢：</span>
                <div class="segment-wrapper" style="margin-bottom: 0; flex: 1;">
                    <button class="seg-btn active" id="payer-liao" onclick="selectPayer('廖噗', this)">👩🏻 廖噗</button>
                    <button class="seg-btn" id="payer-chen" onclick="selectPayer('陳噗', this)">👦🏻 陳噗</button>
                </div>
            </div>

            <h3 class="section-title" id="cat-title">選擇支出分類</h3>
            <div class="bento-grid" id="cat-expense-grid">
                <button class="bento-box active" onclick="selectCategory('交通', this)"><i class="ph-fill ph-train bento-icon"></i><span class="bento-label">交通</span></button>
                <button class="bento-box" onclick="selectCategory('食物', this)"><i class="ph-fill ph-hamburger bento-icon"></i><span class="bento-label">食物</span></button>
                <button class="bento-box" onclick="selectCategory('購物', this)"><i class="ph-fill ph-shopping-bag bento-icon"></i><span class="bento-label">購物</span></button>
                <button class="bento-box" onclick="selectCategory('其他', this)"><i class="ph-fill ph-ticket bento-icon"></i><span class="bento-label">其他</span></button>
            </div>
            <div class="bento-grid" id="cat-income-grid" style="display: none;">
                <button class="bento-box income-cat active" onclick="selectCategory('薪水', this)"><i class="ph-fill ph-money bento-icon"></i><span class="bento-label">薪水</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('獎金', this)"><i class="ph-fill ph-gift bento-icon"></i><span class="bento-label">獎金</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('轉帳', this)"><i class="ph-fill ph-bank bento-icon"></i><span class="bento-label">轉帳</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('其他入帳', this)"><i class="ph-fill ph-piggy-bank bento-icon"></i><span class="bento-label">其他</span></button>
            </div>

            <h3 class="section-title">記下一筆</h3>
            <div class="input-composite">
                <div class="input-row">
                    <input type="text" id="item-name" placeholder="品項名稱 (選填)">
                </div>
                <div class="price-action-row">
                    <div class="price-input-wrapper" id="input-wrapper">
                        <div class="curr-toggle" id="curr-symbol">$</div>
                        <input type="number" id="item-price" placeholder="輸入金額" min="0" step="1">
                    </div>
                    <button class="submit-fab" id="submit-btn" onclick="addExpense()"><i class="ph-bold ph-plus"></i></button>
                </div>
            </div>

            <h3 class="section-title">本日紀錄</h3>
            <div id="expense-list" class="history-list"></div>
        </section>

        <section id="view-analysis" class="view-container">
            <div class="date-picker-wrapper" style="margin-top: 10px;">
                <input type="month" id="analysis-month">
            </div>

            <h3 class="section-title">當月個人實際花費 (個人支出 + 共用均分)</h3>
            <div class="dash-summary">
                <div class="dash-card">
                    <span class="dc-title">👩🏻 廖噗</span>
                    <div class="dc-val exp" id="analysis-liao-spend">$0</div>
                </div>
                <div class="dash-card">
                    <span class="dc-title">👦🏻 陳噗</span>
                    <div class="dc-val exp" id="analysis-chen-spend">$0</div>
                </div>
            </div>

            <h3 class="section-title">整體支出分類排行 (不含還款紀錄)</h3>
            <div class="chart-section" id="cat-chart-container">
                </div>
        </section>

        <section id="view-settlement" class="view-container">
            <h3 class="section-title" style="margin-top: 10px;">總累積欠款結算板 (無月份限制)</h3>
            <div class="dash-summary">
                <div class="dash-card full" id="global-settlement-card">
                    </div>
            </div>

            <h3 class="section-title">歷史還款紀錄</h3>
            <div id="settlement-history-list" class="history-list">
                </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="tab-btn active" id="tab-accounting" onclick="switchTab('accounting')">
            <i class="ph-fill ph-wallet"></i>
            <span>記帳</span>
        </button>
        <button class="tab-btn" id="tab-analysis" onclick="switchTab('analysis')">
            <i class="ph-fill ph-chart-pie-slice"></i>
            <span>當月分析</span>
        </button>
        <button class="tab-btn" id="tab-settlement" onclick="switchTab('settlement')">
            <i class="ph-fill ph-handshake"></i>
            <span>累積結算</span>
        </button>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx9QRzDsOKhw89lgS03-oOhGpUcfd6szO3-QZ78w_6Mpz18rLnszsFHNyyfzEJntg1m/exec';

        function getSafeStorage(key, defaultVal) {

        // 解析資料核心 (包含判斷是否為同月、萃取記錄對象與代墊人)
        function parseItem(item, targetDateStr, targetMonthStr) {
            const sheetDate = String(item.date).trim();
            const rawPrice = parseFloat(item.price) || 0;
            const isIncome = rawPrice < 0; 
            const absPrice = Math.round(Math.abs(rawPrice));
            
            let isSameMonth = false;
            let isSameDay = false;
            
            if (targetDateStr && targetMonthStr) {
                const tdObj = new Date(targetDateStr);
                const tmObj = new Date(targetMonthStr + '-01'); 
                
                if (sheetDate.includes('-') || sheetDate.includes('/')) {
                    const d = new Date(sheetDate);
                    if(!isNaN(d.getTime())) {
                        isSameMonth = (d.getFullYear() === tmObj.getFullYear() && d.getMonth() === tmObj.getMonth());
                        isSameDay = (d.getFullYear() === tdObj.getFullYear() && d.getMonth() === tdObj.getMonth() && d.getDate() === tdObj.getDate());
                    }
                } else if (sheetDate === targetDateStr) {
                    isSameDay = true;
                    isSameMonth = true;
                }
            }

            const safeName = String(item.name).replace(/[<>]/g, "");
            let person = '噗噗'; 
            let payer = '未知';
            let displayName = safeName;
            
            // 標籤格式：【消費對象|代墊人】名稱
            const tagMatch = safeName.match(/^【(.*?)】(.*)/);
            if (tagMatch) {
                const fullTag = tagMatch[1];
                displayName = tagMatch[2].trim();
                if (fullTag.includes('|')) {
                    const parts = fullTag.split('|');
                    person = parts[0];
                    payer = parts[1];
                } else {
                    person = fullTag;
                    payer = fullTag; 
                }
            }

            return { ...item, isIncome, absPrice, isSameMonth, isSameDay, person, payer, displayName };
        }

        function renderExpenses() {
            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';
            
            let monthlyShared = 0;
            let monthlyP2 = 0; // 廖噗個人
            let monthlyP3 = 0; // 陳噗個人
            const selectedDayItems = [];

            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, Store.state.date, Store.state.date.substring(0,7));
                
                if (item.isSameMonth && !item.isIncome && item.cat !== '結清') {
                    if (item.person === '噗噗') monthlyShared += item.absPrice;
                    else if (item.person === '廖噗') monthlyP2 += item.absPrice;
                    else if (item.person === '陳噗') monthlyP3 += item.absPrice;
                }
                if (item.isSameDay) selectedDayItems.push(item);
            });

            if (selectedDayItems.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-weight:600;">本日尚無紀錄</div>`;
            } else {
                selectedDayItems.forEach(item => {
                    const icon = item.cat === '結清' ? 'ph-handshake' : (EMOJI_MAP[item.cat] || 'ph-ticket');
                    let incClass = '';
                    let sign = '';
                    
                    if (item.cat === '結清') {
                        incClass = 'settled';
                    } else if (item.isIncome) {
                        incClass = 'inc';
                        sign = '+';
                    }

                    let personTagHtml = '';
                    if (item.cat === '結清') {
                        personTagHtml = `<span class="h-tag settled">💸 還款紀錄</span>`;
                    } else if (!item.isIncome) {
                        if (item.person === '噗噗') {
                            personTagHtml = `<span class="h-tag shared">👥 共用 (${item.payer}付)</span>`;
                        } else if (item.person !== item.payer) {
                            personTagHtml = `<span class="h-tag alert">⚠️ ${item.person} (${item.payer}付)</span>`;
                        } else {
                            personTagHtml = `<span class="h-tag">${item.person}</span>`;
                        }
                    } else {
                        personTagHtml = `<span class="h-tag">${item.person}</span>`;
                    }

                    listEl.innerHTML += `
                    <div class="h-item">
                        <div class="h-left">
                            <div class="h-icon ${incClass}"><i class="ph-fill ${icon}"></i></div>
                            <div class="h-info">
                                <h4>${item.displayName} ${personTagHtml}</h4>
                                <span class="h-cat">${item.cat}</span>
                            </div>
                        </div>
                        <div class="h-right">
                            <div class="h-price ${incClass}">${sign}$${item.absPrice}</div>
                            <button class="h-del" onclick="deleteExpense('${item.id}')"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>`;
                });
            }
            
            // 記帳首頁：個人卡片顯示 (個人當月消費 + 共用均分)
            const actualP2 = monthlyP2 + (monthlyShared / 2);
            const actualP3 = monthlyP3 + (monthlyShared / 2);
            
            document.getElementById('total-shared').innerText = `NT$ ${monthlyShared.toLocaleString()}`;
            document.getElementById('total-p2').innerText = `$${Math.round(actualP2).toLocaleString()}`;
            document.getElementById('total-p3').innerText = `$${Math.round(actualP3).toLocaleString()}`;
            
            let currentBudget = Store.state.budget;
            document.getElementById('budget-total-label').innerText = `/ ${(currentBudget/1000).toFixed(1).replace('.0','')}k 預算`;

            let spentPercent = (monthlyShared / currentBudget) * 100;
            let remaining = currentBudget - monthlyShared;
            const fillEl = document.getElementById('budget-fill');
            const remLabel = document.getElementById('budget-rem-label');

            fillEl.style.width = `${Math.min(spentPercent, 100)}%`;

            if (remaining >= 0) {
                remLabel.innerText = `剩餘 NT$ ${remaining.toLocaleString()}`;
                remLabel.style.color = 'rgba(255,255,255,0.95)';
                fillEl.style.background = spentPercent > 85 ? '#e0d7cf' : 'var(--bg-color)'; 
            } else {
                remLabel.innerText = `超支 NT$ ${Math.abs(remaining).toLocaleString()}`;
                remLabel.style.color = '#ffb3b3'; 
                fillEl.style.background = '#ffb3b3';
            }
        }

        function renderAnalysis() {
            let monthlyShared = 0;
            let monthlyP2 = 0; // 廖噗個人
            let monthlyP3 = 0; // 陳噗個人
            let totalExp = 0; 
            let catStats = {};

            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, '', Store.state.analysisMonth);
                
                if (item.isSameMonth && !item.isIncome && item.cat !== '結清') {
                    totalExp += item.absPrice;
                    catStats[item.cat] = (catStats[item.cat] || 0) + item.absPrice;
                    
                    if (item.person === '噗噗') monthlyShared += item.absPrice;
                    else if (item.person === '廖噗') monthlyP2 += item.absPrice;
                    else if (item.person === '陳噗') monthlyP3 += item.absPrice;
                }
            });

            // 當月實際花費 (個人 + 共用均分)
            const actualLiao = Math.round(monthlyP2 + (monthlyShared / 2));
            const actualChen = Math.round(monthlyP3 + (monthlyShared / 2));

            document.getElementById('analysis-liao-spend').innerText = `$${actualLiao.toLocaleString()}`;
            document.getElementById('analysis-chen-spend').innerText = `$${actualChen.toLocaleString()}`;

            let catHtml = '';
            let sortedCats = Object.keys(catStats).sort((a,b) => catStats[b] - catStats[a]);
            
            if(sortedCats.length === 0) {
                catHtml = '<div style="text-align:center; color:var(--text-muted); font-size:13px;">本月尚無支出資料</div>';
            } else {
                sortedCats.forEach(cat => {
                    let val = catStats[cat];
                    let pct = totalExp === 0 ? 0 : Math.round((val / totalExp) * 100);
                    let icon = EMOJI_MAP[cat] || 'ph-ticket';
                    catHtml += `
                    <div class="chart-row">
                        <div class="cr-top">
                            <div class="cr-name"><i class="ph-fill ${icon}"></i> ${cat}</div>
                            <div class="cr-val">$${val.toLocaleString()}</div>
                        </div>
                        <div class="cr-track"><div class="cr-fill p1" style="width: ${pct}%; opacity: ${Math.max(0.4, pct/100 + 0.2)}"></div></div>
                    </div>`;
                });
            }
            document.getElementById('cat-chart-container').innerHTML = catHtml;
        }

        // ====== 累積結算邏輯 (全域不分月) ======
        function renderSettlement() {
            let sharedPaidByLiao = 0;
            let sharedPaidByChen = 0;
            let chenPersonalPaidByLiao = 0;
            let liaoPersonalPaidByChen = 0;
            let settledByLiao = 0; // 廖噗付給陳噗的結算金額
            let settledByChen = 0; // 陳噗付給廖噗的結算金額

            let historyHtml = '';
            const historyList = [];

            Store.state.expenses.forEach(rawItem => {
                // 不傳入月份，因此不會進行同月檢查
                const item = parseItem(rawItem, '', '');
                
                if (!item.isIncome) {
                    if (item.cat === '結清') {
                        if (item.payer === '廖噗') settledByLiao += item.absPrice;
                        if (item.payer === '陳噗') settledByChen += item.absPrice;
                        historyList.push(item);
                    } else {
                        // 全域計算代墊
                        if (item.person === '噗噗') {
                            if (item.payer === '廖噗') sharedPaidByLiao += item.absPrice;
                            if (item.payer === '陳噗') sharedPaidByChen += item.absPrice;
                        } else if (item.person === '廖噗' && item.payer === '陳噗') {
                            liaoPersonalPaidByChen += item.absPrice;
                        } else if (item.person === '陳噗' && item.payer === '廖噗') {
                            chenPersonalPaidByLiao += item.absPrice;
                        }
                    }
                }
            });

            // 結算公式：廖噗淨餘額
            let liaoBalance = (sharedPaidByLiao / 2) - (sharedPaidByChen / 2) 
                            + chenPersonalPaidByLiao - liaoPersonalPaidByChen 
                            - settledByChen + settledByLiao;
            
            liaoBalance = Math.round(liaoBalance);

            const cardEl = document.getElementById('global-settlement-card');
            
            if (sharedPaidByLiao === 0 && sharedPaidByChen === 0 && chenPersonalPaidByLiao === 0 && liaoPersonalPaidByChen === 0 && settledByLiao === 0 && settledByChen === 0) {
                cardEl.innerHTML = `
                    <span class="dc-title">目前累積餘額</span>
                    <div class="dc-val net" style="color: var(--text-muted);">目前無任何帳目產生</div>
                `;
            } else if (liaoBalance === 0) {
                cardEl.innerHTML = `
                    <span class="dc-title">目前累積餘額</span>
                    <div class="dc-val net" style="color: var(--income-color);">歷史帳目已完全結清！🎉</div>
                `;
            } else if (liaoBalance > 0) {
                cardEl.innerHTML = `
                    <span class="dc-title">目前累積餘額 (陳噗應付款)</span>
                    <div class="dc-val net">👦🏻 陳噗 <span style="font-size:16px; color:var(--text-muted);">給</span> 👩🏻 廖噗<br>$${liaoBalance.toLocaleString()}</div>
                    <button class="btn-settle" onclick="settleDebt(${liaoBalance}, '陳噗')">✅ 一鍵結清 (記錄陳噗還款)</button>
                `;
            } else {
                const absBalance = Math.abs(liaoBalance);
                cardEl.innerHTML = `
                    <span class="dc-title">目前累積餘額 (廖噗應付款)</span>
                    <div class="dc-val net">👩🏻 廖噗 <span style="font-size:16px; color:var(--text-muted);">給</span> 👦🏻 陳噗<br>$${absBalance.toLocaleString()}</div>
                    <button class="btn-settle" onclick="settleDebt(${absBalance}, '廖噗')">✅ 一鍵結清 (記錄廖噗還款)</button>
                `;
            }

            // 歷史還款紀錄
            if(historyList.length === 0) {
                historyHtml = '<div style="text-align:center; padding: 20px; color:var(--text-muted); font-weight:600;">尚無任何歷史結清紀錄</div>';
            } else {
                // 反轉陣列，讓最新紀錄排在前面
                historyList.reverse().forEach(item => {
                    historyHtml += `
                    <div class="h-item">
                        <div class="h-left">
                            <div class="h-icon settled"><i class="ph-fill ph-handshake"></i></div>
                            <div class="h-info">
                                <h4>${item.displayName}</h4>
                                <span class="h-cat">${item.date}</span>
                            </div>
                        </div>
                        <div class="h-right">
                            <div class="h-price settled">$${item.absPrice}</div>
                            <button class="h-del" onclick="deleteExpense('${item.id}')"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('settlement-history-list').innerHTML = historyHtml;
        }

        async function settleDebt(amount, payer) {
            // 增加對話框詢問是誰操作的，以此留下紀錄
            const operator = prompt(`確定要記錄「${payer}」已經還款 $${amount} 嗎？\n\n請問是誰按下這個結清按鈕的？\n(請輸入 廖噗 或 陳噗，以此署名記錄)`, payer);
            if (!operator) return; // 使用者按取消
            
            const finalOperator = operator.includes('廖') ? '廖噗' : (operator.includes('陳') ? '陳噗' : operator);

            const newId = Date.now().toString();
            
            // 使用系統當天日期作為還款日
            const today = new Date();
            const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

            const newExpenseObj = { 
                id: newId, 
                date: localDate, 
                cat: '結清', 
                name: `【結清|${payer}】${finalOperator} 操作還款確認`, 
                price: amount 
            };
            
            Store.updateExpenses([...Store.state.expenses, newExpenseObj]);
            renderSettlement();
            showToast(`已成功記錄 ${payer} 的還款！`);

            try {
                const params = new URLSearchParams({ action: 'add', ...newExpenseObj });
                await fetch(SCRIPT_URL, { method: 'POST', body: params });
                fetchExpenses();
            } catch (err) { showToast('背景同步失敗，已存於本機', 'error'); }
        }

        async function fetchExpenses() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const freshData = await res.json();
                if (Array.isArray(freshData)) {
                    Store.updateExpenses(freshData);
                    renderExpenses();
                    if(document.getElementById('view-analysis').classList.contains('active')) renderAnalysis();
                    if(document.getElementById('view-settlement').classList.contains('active')) renderSettlement();
                }
            } catch (err) { console.error("Fetch Data Error:", err); }
        }

        async function addExpense() {
            const nameEl = document.getElementById('item-name');
            const priceEl = document.getElementById('item-price');
            const inputPrice = parseFloat(priceEl.value); 
            
            if (isNaN(inputPrice) || inputPrice <= 0) return showToast('請輸入有效金額', 'error'); 
            
            let baseName = nameEl.value.trim() || Store.state.category;
            let isInc = Store.state.recordType === 'income';
            
            let finalName = baseName;
            
            // 標籤組合邏輯：若為支出，一律使用 【消費對象|代墊人】 格式儲存
            if (!isInc) {
                finalName = `【${Store.state.person}|${Store.state.payer}】${baseName}`;
            } else {
                finalName = `【${Store.state.person}】${baseName}`; // 收入僅綁定個人
            }
            
            let finalPrice = isInc ? -Math.abs(Math.round(inputPrice)) : Math.abs(Math.round(inputPrice));
            
            const newId = Date.now().toString();
            const newExpenseObj = { id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPrice };
            
            Store.updateExpenses([...Store.state.expenses, newExpenseObj]);
            renderExpenses();
            
            nameEl.value = ''; priceEl.value = ''; priceEl.blur(); 
            showToast(`已新增一筆${isInc ? '收入' : '花費'}`);

            try {
                const params = new URLSearchParams({ action: 'add', ...newExpenseObj });
                await fetch(SCRIPT_URL, { method: 'POST', body: params });
                fetchExpenses();
            } catch (err) { showToast('背景同步失敗，已存於本機', 'error'); }
        }

        async function deleteExpense(id) {
            if (!confirm('確定刪除此筆紀錄？')) return;
            const original = [...Store.state.expenses]; 
            Store.updateExpenses(Store.state.expenses.filter(item => String(item.id) !== String(id)));
            renderExpenses(); 
            if(document.getElementById('view-analysis').classList.contains('active')) renderAnalysis();
            if(document.getElementById('view-settlement').classList.contains('active')) renderSettlement();

            try { 
                await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'delete', id: String(id) }) }); 
                showToast('紀錄已刪除');
                fetchExpenses();
            } catch (err) { 
                Store.updateExpenses(original); renderExpenses(); 
                showToast('刪除失敗', 'error');
            }
        }
    </script>
</body>
</html>
