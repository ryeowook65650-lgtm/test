    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        :root {
            --bg-color: #F2F0EB;       
            --card-bg: #FFFFFF;        
            --primary: #5C6B6A;        
            --primary-light: #DEE3E2;  
            --secondary: #E5E3DC;      
            --text-main: #2E3332;      
            --text-muted: #8E9695;     
            --border-color: rgba(0, 0, 0, 0.05); 
            --income-color: #718776;   
            --deficit-color: #A37070;
            
            --radius-lg: 24px;
            --radius-md: 16px;
            --radius-sm: 10px;
            
            --shadow-card: 0 8px 24px rgba(46, 51, 50, 0.04); 
            --shadow-btn: 0 4px 12px rgba(92, 107, 106, 0.25);
            
            --font-family: 'Inter', 'Noto Sans TC', sans-serif;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: var(--font-family); }

        body { 
            margin: 0; padding: 0; background-color: var(--bg-color); color: var(--text-main);
            padding-bottom: calc(90px + env(safe-area-inset-bottom)); 
            overscroll-behavior-y: none;
        }

        button, input, select { appearance: none; -webkit-appearance: none; border: none; background: none; outline: none; margin: 0; padding: 0; }
        button { cursor: pointer; transition: transform 0.15s ease, opacity 0.15s ease; }
        button:active { transform: scale(0.95); opacity: 0.8; }

        .app-header {
            position: sticky; top: 0; z-index: 100;
            background: rgba(242, 240, 235, 0.85); 
            backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
            padding: calc(16px + env(safe-area-inset-top)) 24px 16px;
            display: flex; justify-content: space-between; align-items: flex-end;
            border-bottom: 1px solid rgba(0, 0, 0, 0.03);
        }
        .app-header h1 { margin: 0; font-size: 28px; font-weight: 800; color: var(--text-main); letter-spacing: -0.5px; }
        .app-header .subtitle { font-size: 13px; color: var(--text-muted); font-weight: 600; margin-top: 4px; display: block; }
        
        .header-actions { display: flex; align-items: center; gap: 8px; }
        .refresh-fab { background: var(--card-bg); width: 34px; height: 34px; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-card); color: var(--primary); font-size: 18px; border: 1px solid var(--border-color); }

        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 0, 0, 0.05); z-index: 999;
            display: flex; justify-content: space-around; padding: 12px 10px calc(12px + env(safe-area-inset-bottom));
        }
        .tab-btn { flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px; color: #B0B5B4; }
        .tab-btn i { font-size: 26px; transition: 0.2s; }
        .tab-btn span { font-size: 11px; font-weight: 800; }
        .tab-btn.active { color: var(--primary); }
        .tab-btn.active i { transform: translateY(-2px); }

        .view-container { display: none; padding: 0 20px; animation: fadeIn 0.3s ease forwards; }
        .view-container.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .balance-card {
            background: linear-gradient(135deg, #7A8B8A 0%, #51605F 100%);
            border-radius: var(--radius-lg); padding: 20px 24px; color: #FFF; margin-top: 10px; margin-bottom: 24px;
            box-shadow: 0 12px 32px rgba(81, 96, 95, 0.2); position: relative; overflow: hidden;
        }
        .balance-card::after { content: ''; position: absolute; right: -20px; top: -20px; width: 120px; height: 120px; background: rgba(255,255,255,0.06); border-radius: 50%; pointer-events: none;}
        
        .b-title { font-size: 13px; font-weight: 600; opacity: 0.85; display: flex; justify-content: space-between; position: relative; z-index: 2; margin-bottom: 16px; }

        .mini-budget-block { display: flex; flex-direction: column; gap: 6px; position: relative; z-index: 2;}
        .mb-header { display: flex; justify-content: space-between; align-items: flex-end; }
        .mb-name { font-size: 13px; font-weight: 600; opacity: 0.9; }
        .mb-name strong { font-size: 20px; font-weight: 800; margin-left: 6px; display: inline-block; transform: translateY(1px); color: #FFF;}
        .mb-edit { font-size: 11px; opacity: 0.9; cursor: pointer; padding: 4px 8px; background: rgba(255,255,255,0.15); border-radius: 6px; transition: 0.2s; display: flex; align-items: center; gap: 4px; font-weight: 600;}
        .mb-edit:active { background: rgba(255,255,255,0.3); transform: scale(0.95); }
        .mb-track { height: 5px; background: rgba(255,255,255,0.2); border-radius: 99px; overflow: hidden; box-shadow: inset 0 1px 2px rgba(0,0,0,0.1); }
        .mb-fill { height: 100%; width: 0%; background: var(--bg-color); border-radius: 99px; transition: width 0.8s cubic-bezier(0.16, 1, 0.3, 1), background-color 0.4s ease; }
        .mb-rem { font-size: 10px; font-weight: 600; text-align: right; opacity: 0.85; margin-top: -2px;}

        .date-picker-wrapper { background: var(--card-bg); border-radius: 12px; padding: 12px; margin-bottom: 16px; box-shadow: var(--shadow-card); display: flex; align-items: center; justify-content: space-between; border: 1px solid var(--border-color); }
        .date-picker-wrapper input { font-size: 16px; font-weight: 600; color: var(--text-main); width: 100%; background: transparent; }

        .type-segment { display: flex; gap: 8px; margin-bottom: 20px; }
        .type-btn { flex: 1; text-align: center; padding: 12px 0; font-size: 14px; font-weight: 800; border-radius: 12px; transition: all 0.3s ease; background: var(--secondary); color: #9A9E9D; border: 2px solid transparent;}
        .type-btn.active.expense { background: var(--card-bg) !important; color: var(--primary) !important; border-color: var(--primary) !important; box-shadow: var(--shadow-card); }
        .type-btn.active.income { background: var(--card-bg) !important; color: var(--income-color) !important; border-color: var(--income-color) !important; box-shadow: 0 4px 12px rgba(113, 135, 118, 0.15); }

        .segment-wrapper { background: var(--secondary); border-radius: 12px; display: flex; padding: 4px; margin-bottom: 20px; }
        .seg-btn { flex: 1; text-align: center; padding: 10px 0; font-size: 13px; font-weight: 600; color: #8A8E8D; border-radius: 8px; transition: 0.2s; }
        .seg-btn.active { background: #FFF; color: var(--text-main); box-shadow: 0 2px 8px rgba(0,0,0,0.04); }

        .payer-segment { display: none; align-items: center; gap: 12px; margin-top: -10px; margin-bottom: 20px; background: rgba(229, 227, 220, 0.5); padding: 8px 12px; border-radius: 12px; border: 1px dashed rgba(92, 107, 106, 0.2); animation: fadeIn 0.3s ease forwards; }
        .payer-segment.active { display: flex; }
        .payer-segment span { font-size: 13px; font-weight: 800; color: var(--text-main); flex-shrink: 0; }

        .section-title { font-size: 14px; font-weight: 800; margin: 0 0 12px; color: var(--text-main); }
        .bento-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-bottom: 24px; }
        .bento-box { background: var(--card-bg); border-radius: var(--radius-md); padding: 16px; text-align: center; border: 2px solid transparent; box-shadow: var(--shadow-card); transition: 0.2s; }
        .bento-box.active { border-color: var(--primary); background: var(--primary-light); }
        .bento-box.active.income-cat { border-color: var(--income-color); background: rgba(113, 135, 118, 0.12); }
        .bento-icon { font-size: 32px; display: block; margin-bottom: 8px; color: var(--text-main); }
        .bento-box.active .bento-icon { color: var(--primary); }
        .bento-box.active.income-cat .bento-icon { color: var(--income-color); }
        .bento-label { font-size: 13px; font-weight: 600; color: var(--text-main); }
        .bento-box.active .bento-label { color: var(--primary); }
        .bento-box.active.income-cat .bento-label { color: var(--income-color); }

        .input-composite { background: var(--card-bg); border-radius: var(--radius-lg); padding: 16px; box-shadow: var(--shadow-card); margin-bottom: 30px; border: 1px solid var(--border-color); }
        .input-row { display: flex; align-items: center; border-bottom: 1px solid var(--border-color); padding-bottom: 12px; margin-bottom: 12px; }
        .input-row input { flex: 1; font-size: 16px; font-weight: 600; padding: 8px; color: var(--text-main); }
        .input-row input::placeholder { color: #C2C7C6; }
        
        .price-action-row { display: flex; align-items: center; justify-content: space-between; }
        .price-input-wrapper { display: flex; align-items: center; background: rgba(229, 227, 220, 0.4); border-radius: 12px; padding: 12px 16px; flex: 1; margin-right: 12px; transition: 0.3s;}
        .curr-toggle { font-weight: 800; font-size: 20px; color: var(--text-main); margin-right: 12px; padding-right: 12px; border-right: 2px solid #D1D6D5; user-select: none; transition: 0.3s;}
        .price-input-wrapper input { font-size: 24px; font-weight: 800; width: 100%; color: var(--text-main); transition: 0.3s;}
        .price-input-wrapper input::placeholder { color: #C2C7C6; font-weight: 600; font-size: 18px; }
        .submit-fab { width: 54px; height: 54px; border-radius: 16px; background: var(--primary); color: #FFF; font-size: 24px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-btn); flex-shrink: 0; transition: 0.3s;}

        .history-list { display: flex; flex-direction: column; gap: 12px; padding-bottom: 20px;}
        .h-item { background: var(--card-bg); padding: 16px; border-radius: var(--radius-md); display: flex; justify-content: space-between; align-items: center; box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .h-left { display: flex; align-items: center; gap: 12px; }
        .h-icon { width: 44px; height: 44px; background: rgba(229, 227, 220, 0.5); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; color: var(--text-main); }
        .h-icon.inc { background: rgba(113, 135, 118, 0.12); color: var(--income-color); }
        .h-icon.settled { background: #E8F0EA; color: #58705F; }
        .h-info h4 { margin: 0 0 4px; font-size: 14px; font-weight: 600; color: var(--text-main); }
        .h-tag { font-size: 10px; background: var(--primary-light); padding: 3px 6px; border-radius: 4px; font-weight: 800; color: #434D4C; margin-left: 6px; display: inline-block;}
        .h-tag.shared { background: #EBE6DF; color: #8A7B6B; } 
        .h-tag.alert { background: #EBD9D9; color: #8C5B5B; } 
        .h-tag.settled { background: #E8F0EA; color: #58705F; } 
        .h-right { text-align: right; }
        .h-price { font-size: 16px; font-weight: 800; color: var(--text-main); margin-bottom: 2px; }
        .h-price.inc { color: var(--income-color); }
        .h-price.settled { color: #58705F; }
        .h-cat { font-size: 12px; color: var(--text-muted); font-weight: 600; }
        .h-del { color: #C28282; padding: 10px; margin-left: 5px; font-size: 20px; cursor: pointer; border: none; background: none;}

        .dash-summary { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
        .dash-card { background: var(--card-bg); padding: 16px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border-color); }
        .dash-card.full { grid-column: span 2; background: linear-gradient(135deg, #FFFFFF 0%, #FAFAFA 100%); border: 1px solid rgba(0, 0, 0, 0.05);}
        .dc-title { font-size: 12px; color: var(--text-muted); font-weight: 800; margin-bottom: 8px; display: block; }
        .dc-val { font-size: 22px; font-weight: 800; color: var(--text-main); }
        .dc-val.exp { color: var(--text-main); }
        .dc-val.net { font-size: 24px; color: var(--text-main); margin: 8px 0; line-height: 1.4; }
        .dc-val.positive { color: var(--income-color); }
        .dc-val.negative { color: var(--deficit-color); }
        
        .btn-settle { background: var(--income-color); color: #FFF; border-radius: 12px; padding: 12px 20px; font-size: 14px; font-weight: 800; width: 100%; margin-top: 12px; border: none; box-shadow: 0 4px 12px rgba(113, 135, 118, 0.2); transition: 0.2s;}
        .btn-settle:active { transform: scale(0.95); opacity: 0.8; }

        .chart-section { background: var(--card-bg); padding: 20px; border-radius: var(--radius-lg); box-shadow: var(--shadow-card); border: 1px solid var(--border-color); margin-bottom: 24px; }
        .chart-row { margin-bottom: 16px; }
        .chart-row:last-child { margin-bottom: 0; }
        .cr-top { display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; margin-bottom: 6px; }
        .cr-name { display: flex; align-items: center; gap: 6px; color: var(--text-main); }
        .cr-val { color: var(--text-muted); }
        .cr-track { height: 6px; background: rgba(0, 0, 0, 0.04); border-radius: 4px; overflow: hidden; }
        .cr-fill { height: 100%; background: var(--primary); border-radius: 4px; transition: width 0.8s ease; }

        .toast-container { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 9999; width: 90%; pointer-events: none;}
        .toast { background: rgba(46, 51, 50, 0.95); backdrop-filter: blur(10px); color: #FFF; padding: 14px 20px; border-radius: 12px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,0.1); display: flex; align-items: center; gap: 12px; animation: toastIn 0.3s forwards; }
        .toast.error { background: rgba(194, 130, 130, 0.95); }
        @keyframes toastIn { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <header class="app-header">
        <div>
            <h1 id="header-title">噗噗記帳本</h1>
            <span class="subtitle">專屬理財小天地</span>
        </div>
        <div class="header-actions">
            <button class="refresh-fab" onclick="manualSync()">
                <i class="ph-bold ph-arrows-clockwise"></i>
            </button>
        </div>
    </header>

    <main>
        <section id="view-accounting" class="view-container active">
            
            <div class="balance-card">
                <div class="b-title">
                    <span>當月個人花費進度</span>
                    <span style="font-weight: 400; opacity: 0.8;">含共用均分</span>
                </div>
                
                <div class="mini-budget-block">
                    <div class="mb-header">
                        <span class="mb-name">🦭 廖噗 <strong id="spend-liao">$0</strong></span>
                        <span class="mb-edit" onclick="editBudget('廖噗')">/ <span id="budget-liao-lbl">15k</span> <i class="ph-bold ph-pencil-simple"></i></span>
                    </div>
                    <div class="mb-track"><div class="mb-fill" id="fill-liao"></div></div>
                    <div class="mb-rem" id="rem-liao">剩餘 $15,000</div>
                </div>

                <div class="mini-budget-block" style="margin-top: 14px;">
                    <div class="mb-header">
                        <span class="mb-name">🦦 陳噗 <strong id="spend-chen">$0</strong></span>
                        <span class="mb-edit" onclick="editBudget('陳噗')">/ <span id="budget-chen-lbl">15k</span> <i class="ph-bold ph-pencil-simple"></i></span>
                    </div>
                    <div class="mb-track"><div class="mb-fill" id="fill-chen"></div></div>
                    <div class="mb-rem" id="rem-chen">剩餘 $15,000</div>
                </div>
            </div>

            <div class="date-picker-wrapper">
                <input type="date" id="expense-date">
            </div>

            <div class="type-segment">
                <button class="type-btn active expense" id="btn-type-exp" onclick="setRecordType('expense')">支出</button>
                <button class="type-btn income" id="btn-type-inc" onclick="setRecordType('income')">收入</button>
            </div>

            <div class="segment-wrapper" id="person-segment">
                <button class="seg-btn active" id="btn-person-shared" onclick="selectPerson('噗噗', this)">👥 共用</button>
                <button class="seg-btn" id="btn-person-liao" onclick="selectPerson('廖噗', this)">🦭 廖噗</button>
                <button class="seg-btn" id="btn-person-chen" onclick="selectPerson('陳噗', this)">🦦 陳噗</button>
            </div>

            <div class="payer-segment active" id="payer-container">
                <span>由誰付錢：</span>
                <div class="segment-wrapper" style="margin-bottom: 0; flex: 1;">
                    <button class="seg-btn active" id="payer-liao" onclick="selectPayer('廖噗', this)">🦭 廖噗</button>
                    <button class="seg-btn" id="payer-chen" onclick="selectPayer('陳噗', this)">🦦 陳噗</button>
                    <button class="seg-btn" id="payer-aa" onclick="selectPayer('各自付', this)">✂️ 各自付</button>
                </div>
            </div>

            <h3 class="section-title" id="cat-title">選擇支出分類</h3>
            <div class="bento-grid" id="cat-expense-grid">
                <button class="bento-box active" onclick="selectCategory('房租/電費', this)"><i class="ph-fill ph-house bento-icon"></i><span class="bento-label">房租/電費</span></button>
                <button class="bento-box" onclick="selectCategory('食物', this)"><i class="ph-fill ph-hamburger bento-icon"></i><span class="bento-label">食物</span></button>
                <button class="bento-box" onclick="selectCategory('購物', this)"><i class="ph-fill ph-shopping-bag bento-icon"></i><span class="bento-label">購物</span></button>
                <button class="bento-box" onclick="selectCategory('其他', this)"><i class="ph-fill ph-ticket bento-icon"></i><span class="bento-label">其他</span></button>
            </div>
            <div class="bento-grid" id="cat-income-grid" style="display: none;">
                <button class="bento-box income-cat active" onclick="selectCategory('薪水', this)"><i class="ph-fill ph-money bento-icon"></i><span class="bento-label">薪水</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('獎金', this)"><i class="ph-fill ph-gift bento-icon"></i><span class="bento-label">獎金</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('轉帳', this)"><i class="ph-fill ph-bank bento-icon"></i><span class="bento-label">轉帳</span></button>
                <button class="bento-box income-cat" onclick="selectCategory('其他入帳', this)"><i class="ph-fill ph-piggy-bank bento-icon"></i><span class="bento-label">其他</span></button>
            </div>

            <h3 class="section-title">記下一筆</h3>
            <div class="input-composite">
                <div class="input-row">
                    <input type="text" id="item-name" placeholder="品項名稱 (選填)">
                </div>
                <div class="price-action-row">
                    <div class="price-input-wrapper" id="input-wrapper">
                        <div class="curr-toggle" id="curr-symbol">$</div>
                        <input type="number" id="item-price" placeholder="輸入金額" min="0" step="1" inputmode="numeric" pattern="[0-9]*">
                    </div>
                    <button class="submit-fab" id="submit-btn" onclick="addExpense()"><i class="ph-bold ph-plus"></i></button>
                </div>
            </div>

            <h3 class="section-title">本日紀錄</h3>
            <div id="expense-list" class="history-list"></div>
        </section>

        <section id="view-analysis" class="view-container">
            <div class="date-picker-wrapper" style="margin-top: 10px;">
                <input type="month" id="analysis-month">
            </div>

            <h3 class="section-title">當月個人盈餘與花費結算</h3>
            <div class="dash-summary">
                <div class="dash-card full">
                    <span class="dc-title" style="text-align: left;">🦭 廖噗 當月盈餘</span>
                    <div class="dc-val net" id="analysis-liao-net" style="text-align: left; font-size: 28px;">$0</div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:13px; font-weight:600;">
                        <span style="color:var(--income-color)">收入: <span id="analysis-liao-inc">$0</span></span>
                        <span style="color:var(--text-main)">支出: <span id="analysis-liao-spend">$0</span></span>
                    </div>
                </div>

                <div class="dash-card full">
                    <span class="dc-title" style="text-align: left;">🦦 陳噗 當月盈餘</span>
                    <div class="dc-val net" id="analysis-chen-net" style="text-align: left; font-size: 28px;">$0</div>
                    <div style="display:flex; justify-content:space-between; margin-top:8px; font-size:13px; font-weight:600;">
                        <span style="color:var(--income-color)">收入: <span id="analysis-chen-inc">$0</span></span>
                        <span style="color:var(--text-main)">支出: <span id="analysis-chen-spend">$0</span></span>
                    </div>
                </div>
            </div>

            <h3 class="section-title">當月支出分類排行</h3>
            <div class="chart-section" id="cat-chart-container"></div>
        </section>

        <section id="view-settlement" class="view-container">
            <h3 class="section-title" style="margin-top: 10px;">欠款結算板 (無月份限制)</h3>
            <div class="dash-summary">
                <div class="dash-card full" id="global-settlement-card" style="text-align: center;"></div>
            </div>
            <h3 class="section-title">歷史還款紀錄</h3>
            <div id="settlement-history-list" class="history-list"></div>
        </section>

        <section id="view-savings" class="view-container">
            <h3 class="section-title" style="margin-top: 10px;">兩人總資產 (歷史總累積盈餘)</h3>
            <div class="dash-summary">
                <div class="dash-card full" style="background: linear-gradient(135deg, #7A8B8A 0%, #51605F 100%); color: #FFF; border: none;">
                    <span class="dc-title" style="color: rgba(255,255,255,0.8);">總累積存款</span>
                    <div class="dc-val net" id="savings-total" style="color: #FFF; font-size: 36px; margin: 12px 0;">$0</div>
                </div>
            </div>

            <h3 class="section-title">個人累積盈餘 (不限月份)</h3>
            <div class="dash-summary">
                <div class="dash-card">
                    <span class="dc-title">🦭 廖噗總存款</span>
                    <div class="dc-val net" id="savings-liao-net" style="font-size: 20px;">$0</div>
                </div>
                <div class="dash-card">
                    <span class="dc-title">🦦 陳噗總存款</span>
                    <div class="dc-val net" id="savings-chen-net" style="font-size: 20px;">$0</div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="tab-btn active" id="tab-accounting" onclick="switchTab('accounting')">
            <i class="ph-fill ph-wallet"></i><span>記帳</span>
        </button>
        <button class="tab-btn" id="tab-analysis" onclick="switchTab('analysis')">
            <i class="ph-fill ph-chart-pie-slice"></i><span>當月分析</span>
        </button>
        <button class="tab-btn" id="tab-settlement" onclick="switchTab('settlement')">
            <i class="ph-fill ph-handshake"></i><span>累積結算</span>
        </button>
        <button class="tab-btn" id="tab-savings" onclick="switchTab('savings')">
            <i class="ph-fill ph-piggy-bank"></i><span>總存款</span>
        </button>
    </nav>

    <div id="toast-container" class="toast-container"></div>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzsNStxnPXktWvA7YmOtkiL3TueYGnLKMa66LX2MMtczEbIJgnqKcr0tSnmTC_lMN01_A/exec';

        function getSafeStorage(key, defaultVal) {
            try { return localStorage.getItem(key) ? JSON.parse(localStorage.getItem(key)) : defaultVal; } 
            catch (e) { return defaultVal; }
        }

        const Store = {
            state: {
                expenses: getSafeStorage('cached_expenses', []),
                budgets: getSafeStorage('cached_budgets', { '廖噗': 15000, '陳噗': 15000 }),
                date: '',           
                analysisMonth: '',  
                person: '噗噗',   
                payer: '廖噗',    
                category: '房租/電費',
                recordType: 'expense' 
            },
            updateExpenses(newData) {
                this.state.expenses = newData;
                localStorage.setItem('cached_expenses', JSON.stringify(newData));
            },
            updateBudgets(newBudgets) {
                this.state.budgets = newBudgets;
                localStorage.setItem('cached_budgets', JSON.stringify(newBudgets));
            }
        };

        const EMOJI_MAP = { 
            '房租/電費': 'ph-house', '食物': 'ph-hamburger', '購物': 'ph-shopping-bag', '其他': 'ph-ticket',
            '薪水': 'ph-money', '獎金': 'ph-gift', '轉帳': 'ph-bank', '其他入帳': 'ph-piggy-bank'
        };

        document.addEventListener('DOMContentLoaded', () => {
            const dateInput = document.getElementById('expense-date');
            const monthInput = document.getElementById('analysis-month');
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            
            const localDate = `${yyyy}-${mm}-${dd}`;
            const localMonth = `${yyyy}-${mm}`;
            
            dateInput.value = localDate;
            monthInput.value = localMonth;
            Store.state.date = localDate;
            Store.state.analysisMonth = localMonth;
            
            dateInput.addEventListener('change', (e) => { Store.state.date = e.target.value; renderExpenses(); });
            monthInput.addEventListener('change', (e) => { Store.state.analysisMonth = e.target.value; renderAnalysis(); });
            
            try { 
                renderExpenses(); 
                if (navigator.onLine) fetchExpenses(); 
            } catch (e) { console.error(e); }
        });

        function switchTab(tabId) {
            document.querySelectorAll('.view-container').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`view-${tabId}`).classList.add('active');
            document.getElementById(`tab-${tabId}`).classList.add('active');
            
            let title = '噗噗記帳本';
            if (tabId === 'analysis') title = '當月分析';
            if (tabId === 'settlement') title = '累積結算';
            if (tabId === 'savings') title = '總存款';
            document.getElementById('header-title').innerText = title;

            if (tabId === 'analysis') renderAnalysis();
            if (tabId === 'settlement') renderSettlement();
            if (tabId === 'savings') renderSavings();
        }

        function setRecordType(type) {
            Store.state.recordType = type;
            const isInc = type === 'income';
            const expBtn = document.getElementById('btn-type-exp');
            const incBtn = document.getElementById('btn-type-inc');
            const sharedBtn = document.getElementById('btn-person-shared');
            const payerContainer = document.getElementById('payer-container');
            
            if (isInc) {
                expBtn.classList.remove('active');
                incBtn.classList.add('active');
                sharedBtn.style.display = 'none'; 
                payerContainer.classList.remove('active'); 
                if(Store.state.person === '噗噗') selectPerson('廖噗', document.getElementById('btn-person-liao'));
            } else {
                incBtn.classList.remove('active');
                expBtn.classList.add('active');
                sharedBtn.style.display = 'block'; 
                payerContainer.classList.add('active'); 
            }
            
            document.getElementById('cat-expense-grid').style.display = isInc ? 'none' : 'grid';
            document.getElementById('cat-income-grid').style.display = isInc ? 'grid' : 'none';
            document.getElementById('cat-title').innerText = isInc ? '選擇收入來源' : '選擇支出分類';

            Store.state.category = isInc ? '薪水' : '房租/電費';
            const grids = document.querySelectorAll(isInc ? '#cat-income-grid .bento-box' : '#cat-expense-grid .bento-box');
            grids.forEach(box => box.classList.remove('active'));
            if(grids.length > 0) grids[0].classList.add('active');

            const wrapper = document.getElementById('input-wrapper');
            const sym = document.getElementById('curr-symbol');
            const btn = document.getElementById('submit-btn');
            const input = document.getElementById('item-price');
            
            if (isInc) {
                wrapper.style.background = 'rgba(113, 135, 118, 0.12)';
                sym.style.color = 'var(--income-color)';
                sym.innerText = '+';
                input.style.color = 'var(--income-color)';
                btn.style.background = 'var(--income-color)';
                btn.style.boxShadow = '0 4px 12px rgba(113, 135, 118, 0.2)';
            } else {
                wrapper.style.background = 'rgba(229, 227, 220, 0.4)';
                sym.style.color = 'var(--text-main)';
                sym.innerText = '$';
                input.style.color = 'var(--text-main)';
                btn.style.background = 'var(--primary)';
                btn.style.boxShadow = 'var(--shadow-btn)';
            }
        }

        function selectPerson(person, el) {
            Store.state.person = person;
            document.querySelectorAll('#person-segment .seg-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');

            const payerAA = document.getElementById('payer-aa');
            if (person === '噗噗') {
                payerAA.style.display = 'block';
            } else {
                payerAA.style.display = 'none';
                if (Store.state.payer === '各自付') {
                    const selfBtn = person === '廖噗' ? document.getElementById('payer-liao') : document.getElementById('payer-chen');
                    selectPayer(person, selfBtn);
                }
            }
        }

        function selectPayer(payer, el) {
            Store.state.payer = payer;
            document.querySelectorAll('#payer-container .seg-btn').forEach(btn => btn.classList.remove('active'));
            el.classList.add('active');
        }

        function selectCategory(cat, el) {
            Store.state.category = cat;
            const parent = el.parentElement;
            parent.querySelectorAll('.bento-box').forEach(box => box.classList.remove('active'));
            el.classList.add('active');
        }

        async function editBudget(person) {
            const current = Store.state.budgets[person] || 15000;
            const input = prompt(`請輸入 ${person} 的每月預算：`, current);
            if (input !== null) {
                const num = parseInt(input.replace(/[^\d]/g, ''), 10);
                if (!isNaN(num) && num > 0) {
                    Store.state.budgets[person] = num;
                    Store.updateBudgets(Store.state.budgets); // 更新本機儲存
                    renderExpenses();
                    showToast('預算已更新，正在同步至雲端...');
                    try {
                        const params = new URLSearchParams({ action: 'setBudget', person: person, budget: num });
                        await fetch(SCRIPT_URL, { method: 'POST', body: params });
                        showToast('預算同步成功！');
                    } catch(err) {
                        showToast('同步失敗，僅更新本機', 'error');
                    }
                } else { showToast('請輸入有效數字', 'error'); }
            }
        }

        function manualSync() { showToast('正在同步資料...', 'success'); fetchExpenses(); }

        function showToast(msg, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="ph-fill ${type === 'success' ? 'ph-check-circle' : 'ph-warning-circle'}"></i> <span>${msg}</span>`;
            document.getElementById('toast-container').appendChild(toast);
            setTimeout(() => { toast.classList.add('hide'); setTimeout(() => toast.remove(), 300); }, 2500);
        }

        function parseItem(item, targetDateStr, targetMonthStr) {
            const sheetDate = String(item.date).trim();
            const rawPrice = parseFloat(item.price) || 0;
            const isIncome = rawPrice < 0; 
            const absPrice = Math.round(Math.abs(rawPrice));
            
            let isSameMonth = false, isSameDay = false;
            let d = new Date(sheetDate);
            let isValidDate = !isNaN(d.getTime());
            
            if (targetMonthStr) {
                const tmObj = new Date(targetMonthStr + '-01'); 
                if (isValidDate) isSameMonth = (d.getFullYear() === tmObj.getFullYear() && d.getMonth() === tmObj.getMonth());
                else if (sheetDate.includes(targetMonthStr.replace('-', '/'))) isSameMonth = true;
            } else isSameMonth = true;
            
            if (targetDateStr) {
                const tdObj = new Date(targetDateStr);
                if (isValidDate) isSameDay = (d.getFullYear() === tdObj.getFullYear() && d.getMonth() === tdObj.getMonth() && d.getDate() === tdObj.getDate());
                else if (sheetDate === targetDateStr) isSameDay = true;
            } else isSameDay = true;
            
            const safeName = String(item.name).replace(/[<>]/g, "");
            let person = '噗噗', payer = '未知', displayName = safeName;
            const tagMatch = safeName.match(/^【(.*?)】(.*)/);
            if (tagMatch) {
                const fullTag = tagMatch[1]; displayName = tagMatch[2].trim();
                if (fullTag.includes('|')) { const parts = fullTag.split('|'); person = parts[0]; payer = parts[1]; }
                else { person = fullTag; payer = fullTag; }
            }
            return { ...item, isIncome, absPrice, isSameMonth, isSameDay, person, payer, displayName };
        }

        function renderExpenses() {
            const listEl = document.getElementById('expense-list');
            listEl.innerHTML = '';
            
            let monthlyShared = 0;
            let monthlyP2 = 0; // 廖噗
            let monthlyP3 = 0; // 陳噗
            const selectedDayItems = [];
            
            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, Store.state.date, Store.state.date.substring(0,7));
                if (item.isSameMonth && !item.isIncome && item.cat !== '結清') {
                    if (item.person === '噗噗') monthlyShared += item.absPrice;
                    else if (item.person === '廖噗') monthlyP2 += item.absPrice;
                    else if (item.person === '陳噗') monthlyP3 += item.absPrice;
                }
                if (item.isSameDay) selectedDayItems.push(item);
            });

            if (selectedDayItems.length === 0) {
                listEl.innerHTML = `<div style="text-align:center; padding: 40px 20px; color: var(--text-muted); font-weight:600;">本日尚無紀錄</div>`;
            } else {
                selectedDayItems.forEach(item => {
                    const icon = item.cat === '結清' ? 'ph-handshake' : (EMOJI_MAP[item.cat] || 'ph-ticket');
                    let incClass = '', sign = '';
                    if (item.cat === '結清') incClass = 'settled';
                    else if (item.isIncome) { incClass = 'inc'; sign = '+'; }
                    
                    let personTagHtml = '';
                    if (item.cat === '結清') personTagHtml = `<span class="h-tag settled">還款紀錄</span>`;
                    else if (!item.isIncome) {
                        if (item.person === '噗噗') {
                            let payerText = item.payer === '各自付' ? '各自付' : `${item.payer}付`;
                            personTagHtml = `<span class="h-tag shared">共用 (${payerText})</span>`;
                        } else if (item.person !== item.payer) {
                            personTagHtml = `<span class="h-tag alert">${item.person} (${item.payer}付)</span>`;
                        } else {
                            personTagHtml = `<span class="h-tag">${item.person}</span>`;
                        }
                    } else personTagHtml = `<span class="h-tag">${item.person}</span>`;
                    
                    listEl.innerHTML += `
                    <div class="h-item">
                        <div class="h-left">
                            <div class="h-icon ${incClass}"><i class="ph-fill ${icon}"></i></div>
                            <div class="h-info">
                                <h4>${item.displayName} ${personTagHtml}</h4>
                                <span class="h-cat">${item.cat}</span>
                            </div>
                        </div>
                        <div class="h-right">
                            <div class="h-price ${incClass}">${sign}$${item.absPrice}</div>
                            <button class="h-del" onclick="deleteExpense('${item.id}')"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>`;
                });
            }

            // 更新雙人各自的迷你進度條
            const actualLiao = monthlyP2 + (monthlyShared / 2);
            const actualChen = monthlyP3 + (monthlyShared / 2);

            document.getElementById('spend-liao').innerText = `$${Math.round(actualLiao).toLocaleString()}`;
            document.getElementById('spend-chen').innerText = `$${Math.round(actualChen).toLocaleString()}`;

            let budgetLiao = Store.state.budgets['廖噗'] || 15000;
            let budgetChen = Store.state.budgets['陳噗'] || 15000;

            document.getElementById('budget-liao-lbl').innerText = `${(budgetLiao/1000).toFixed(1).replace('.0','')}k`;
            document.getElementById('budget-chen-lbl').innerText = `${(budgetChen/1000).toFixed(1).replace('.0','')}k`;

            // 廖噗進度條計算
            let pctLiao = (actualLiao / budgetLiao) * 100;
            let remLiao = budgetLiao - actualLiao;
            const fillLiao = document.getElementById('fill-liao');
            const remLblLiao = document.getElementById('rem-liao');
            fillLiao.style.width = `${Math.min(pctLiao, 100)}%`;
            if (remLiao >= 0) { 
                remLblLiao.innerText = `剩餘 $${Math.round(remLiao).toLocaleString()}`; 
                remLblLiao.style.color = 'inherit'; 
                fillLiao.style.background = pctLiao > 85 ? '#EBD9D9' : 'var(--bg-color)'; 
            } else { 
                remLblLiao.innerText = `超支 $${Math.round(Math.abs(remLiao)).toLocaleString()}`; 
                remLblLiao.style.color = '#EBD9D9'; 
                fillLiao.style.background = '#EBD9D9'; 
            }

            // 陳噗進度條計算
            let pctChen = (actualChen / budgetChen) * 100;
            let remChen = budgetChen - actualChen;
            const fillChen = document.getElementById('fill-chen');
            const remLblChen = document.getElementById('rem-chen');
            fillChen.style.width = `${Math.min(pctChen, 100)}%`;
            if (remChen >= 0) { 
                remLblChen.innerText = `剩餘 $${Math.round(remChen).toLocaleString()}`; 
                remLblChen.style.color = 'inherit'; 
                fillChen.style.background = pctChen > 85 ? '#EBD9D9' : 'var(--bg-color)'; 
            } else { 
                remLblChen.innerText = `超支 $${Math.round(Math.abs(remChen)).toLocaleString()}`; 
                remLblChen.style.color = '#EBD9D9'; 
                fillChen.style.background = '#EBD9D9'; 
            }
        }

        function renderAnalysis() {
            let monthlyShared = 0, monthlyP2 = 0, monthlyP3 = 0, totalExp = 0;
            let monthlyIncLiao = 0, monthlyIncChen = 0;
            let catStats = {};

            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, '', Store.state.analysisMonth);
                if (item.isSameMonth && item.cat !== '結清') {
                    if (item.isIncome) {
                        if (item.person === '廖噗') monthlyIncLiao += item.absPrice;
                        if (item.person === '陳噗') monthlyIncChen += item.absPrice;
                    } else {
                        totalExp += item.absPrice; 
                        catStats[item.cat] = (catStats[item.cat] || 0) + item.absPrice;
                        if (item.person === '噗噗') monthlyShared += item.absPrice;
                        else if (item.person === '廖噗') monthlyP2 += item.absPrice;
                        else if (item.person === '陳噗') monthlyP3 += item.absPrice;
                    }
                }
            });

            const actualLiao = Math.round(monthlyP2 + (monthlyShared / 2));
            const actualChen = Math.round(monthlyP3 + (monthlyShared / 2));

            const netLiao = monthlyIncLiao - actualLiao;
            const netChen = monthlyIncChen - actualChen;

            // Liao Update
            const liaoNetEl = document.getElementById('analysis-liao-net');
            liaoNetEl.innerText = `${netLiao >= 0 ? '+' : ''}$${netLiao.toLocaleString()}`;
            liaoNetEl.className = `dc-val net ${netLiao >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('analysis-liao-inc').innerText = `$${monthlyIncLiao.toLocaleString()}`;
            document.getElementById('analysis-liao-spend').innerText = `$${actualLiao.toLocaleString()}`;

            // Chen Update
            const chenNetEl = document.getElementById('analysis-chen-net');
            chenNetEl.innerText = `${netChen >= 0 ? '+' : ''}$${netChen.toLocaleString()}`;
            chenNetEl.className = `dc-val net ${netChen >= 0 ? 'positive' : 'negative'}`;
            document.getElementById('analysis-chen-inc').innerText = `$${monthlyIncChen.toLocaleString()}`;
            document.getElementById('analysis-chen-spend').innerText = `$${actualChen.toLocaleString()}`;

            let catHtml = '';
            let sortedCats = Object.keys(catStats).sort((a,b) => catStats[b] - catStats[a]);
            if(sortedCats.length === 0) {
                catHtml = '<div style="text-align:center; color:var(--text-muted); font-size:13px;">本月尚無支出資料</div>';
            } else {
                sortedCats.forEach(cat => {
                    let val = catStats[cat], pct = totalExp === 0 ? 0 : Math.round((val / totalExp) * 100);
                    let icon = EMOJI_MAP[cat] || 'ph-ticket';
                    catHtml += `<div class="chart-row"><div class="cr-top"><div class="cr-name"><i class="ph-fill ${icon}"></i> ${cat}</div><div class="cr-val">$${val.toLocaleString()}</div></div><div class="cr-track"><div class="cr-fill p1" style="width: ${pct}%; opacity: ${Math.max(0.4, pct/100 + 0.2)}"></div></div></div>`;
                });
            }
            document.getElementById('cat-chart-container').innerHTML = catHtml;
        }

        function renderSettlement() {
            let sharedPaidByLiao = 0, sharedPaidByChen = 0, chenPaidForLiao = 0, liaoPaidForChen = 0, settledByLiao = 0, settledByChen = 0;
            let historyHtml = ''; const historyList = [];
            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, '', '');
                if (!item.isIncome) {
                    if (item.cat === '結清') {
                        if (item.payer === '廖噗') settledByLiao += item.absPrice;
                        if (item.payer === '陳噗') settledByChen += item.absPrice;
                        historyList.push(item);
                    } else {
                        if (item.person === '噗噗') { 
                            if (item.payer === '廖噗') sharedPaidByLiao += item.absPrice; 
                            if (item.payer === '陳噗') sharedPaidByChen += item.absPrice; 
                            // 各自付不增加雙方代墊總額
                        }
                        else if (item.person === '廖噗' && item.payer === '陳噗') chenPaidForLiao += item.absPrice;
                        else if (item.person === '陳噗' && item.payer === '廖噗') liaoPaidForChen += item.absPrice;
                    }
                }
            });
            
            let liaoBalance = Math.round((sharedPaidByLiao / 2) - (sharedPaidByChen / 2) + liaoPaidForChen - chenPaidForLiao - settledByChen + settledByLiao);
            
            const cardEl = document.getElementById('global-settlement-card');
            if (sharedPaidByLiao + sharedPaidByChen + chenPaidForLiao + liaoPaidForChen + settledByLiao + settledByChen === 0) {
                cardEl.innerHTML = `<span class="dc-title">目前累積餘額</span><div class="dc-val net" style="color: var(--text-muted);">目前無任何帳目產生</div>`;
            } else if (liaoBalance === 0) {
                cardEl.innerHTML = `<span class="dc-title">目前累積餘額</span><div class="dc-val net" style="color: var(--income-color);">歷史帳目已完全結清！🎉</div>`;
            } else if (liaoBalance > 0) {
                cardEl.innerHTML = `<span class="dc-title">目前累積餘額 (陳噗應付款)</span><div class="dc-val net">🦦 陳噗 <span style="font-size:16px; color:var(--text-muted);">給</span> 🦭 廖噗<br>$${liaoBalance.toLocaleString()}</div><button class="btn-settle" onclick="settleDebt(${liaoBalance}, '陳噗')">一鍵結清 (記錄陳噗還款)</button>`;
            } else {
                const absBalance = Math.abs(liaoBalance);
                cardEl.innerHTML = `<span class="dc-title">目前累積餘額 (廖噗應付款)</span><div class="dc-val net">🦭 廖噗 <span style="font-size:16px; color:var(--text-muted);">給</span> 🦦 陳噗<br>$${absBalance.toLocaleString()}</div><button class="btn-settle" onclick="settleDebt(${absBalance}, '廖噗')">一鍵結清 (記錄廖噗還款)</button>`;
            }

            if(historyList.length === 0) {
                historyHtml = '<div style="text-align:center; padding: 20px; color:var(--text-muted); font-weight:600;">尚無歷史結清紀錄</div>';
            } else {
                historyList.reverse().forEach(item => {
                    historyHtml += `
                    <div class="h-item">
                        <div class="h-left">
                            <div class="h-icon settled"><i class="ph-fill ph-handshake"></i></div>
                            <div class="h-info">
                                <h4>${item.displayName}</h4>
                                <span class="h-cat">${item.date}</span>
                            </div>
                        </div>
                        <div class="h-right">
                            <div class="h-price settled">$${item.absPrice}</div>
                            <button class="h-del" onclick="deleteExpense('${item.id}')"><i class="ph-bold ph-trash"></i></button>
                        </div>
                    </div>`;
                });
            }
            document.getElementById('settlement-history-list').innerHTML = historyHtml;
        }

        function renderSavings() {
            let totalIncLiao = 0, totalIncChen = 0;
            let totalExpLiao = 0, totalExpChen = 0, totalShared = 0;

            Store.state.expenses.forEach(rawItem => {
                const item = parseItem(rawItem, '', '');
                if (item.cat !== '結清') {
                    if (item.isIncome) {
                        if (item.person === '廖噗') totalIncLiao += item.absPrice;
                        if (item.person === '陳噗') totalIncChen += item.absPrice;
                    } else {
                        if (item.person === '噗噗') totalShared += item.absPrice;
                        else if (item.person === '廖噗') totalExpLiao += item.absPrice;
                        else if (item.person === '陳噗') totalExpChen += item.absPrice;
                    }
                }
            });

            const actualLiao = Math.round(totalExpLiao + (totalShared / 2));
            const actualChen = Math.round(totalExpChen + (totalShared / 2));

            const savingsLiao = totalIncLiao - actualLiao;
            const savingsChen = totalIncChen - actualChen;
            const totalSavings = savingsLiao + savingsChen;

            const totalEl = document.getElementById('savings-total');
            totalEl.innerText = `${totalSavings >= 0 ? '' : '-'}$${Math.abs(totalSavings).toLocaleString()}`;
            
            const liaoEl = document.getElementById('savings-liao-net');
            liaoEl.innerText = `${savingsLiao >= 0 ? '' : '-'}$${Math.abs(savingsLiao).toLocaleString()}`;
            liaoEl.className = `dc-val net ${savingsLiao >= 0 ? 'positive' : 'negative'}`;

            const chenEl = document.getElementById('savings-chen-net');
            chenEl.innerText = `${savingsChen >= 0 ? '' : '-'}$${Math.abs(savingsChen).toLocaleString()}`;
            chenEl.className = `dc-val net ${savingsChen >= 0 ? 'positive' : 'negative'}`;
        }

        async function settleDebt(amount, payer) {
            const operator = prompt(`確定要記錄「${payer}」已還款 $${amount}？\n請輸入操作人 (廖噗 或 陳噗) 以署名：`, payer);
            if (!operator) return;
            const finalOp = operator.includes('廖') ? '廖噗' : (operator.includes('陳') ? '陳噗' : operator);
            const newId = Date.now().toString();
            const today = new Date();
            const localDate = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');
            const newObj = { id: newId, date: localDate, cat: '結清', name: `【結清|${payer}】${finalOp} 操作還款確認`, price: amount };
            Store.updateExpenses([...Store.state.expenses, newObj]);
            renderSettlement();
            showToast(`已成功記錄 ${payer} 的還款！`);
            try { await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'add', ...newObj }) }); fetchExpenses(); } catch (err) { showToast('背景同步失敗，已存於本機', 'error'); }
        }

        async function fetchExpenses() {
            try {
                const res = await fetch(`${SCRIPT_URL}?action=read&t=${Date.now()}`);
                const freshData = await res.json();
                if (freshData.expenses) {
                    Store.updateExpenses(freshData.expenses);
                    if (freshData.budgets) Store.updateBudgets(freshData.budgets);
                    renderExpenses();
                    if(document.getElementById('view-analysis').classList.contains('active')) renderAnalysis();
                    if(document.getElementById('view-settlement').classList.contains('active')) renderSettlement();
                    if(document.getElementById('view-savings').classList.contains('active')) renderSavings();
                } else if (Array.isArray(freshData)) {
                    Store.updateExpenses(freshData);
                    renderExpenses();
                }
            } catch (err) { console.error(err); }
        }

        async function addExpense() {
            const nameEl = document.getElementById('item-name'), priceEl = document.getElementById('item-price'), inputPrice = parseFloat(priceEl.value); 
            if (isNaN(inputPrice) || inputPrice <= 0) return showToast('請輸入有效金額', 'error'); 
            let baseName = nameEl.value.trim() || Store.state.category, isInc = Store.state.recordType === 'income', finalName = '';
            if (!isInc) finalName = `【${Store.state.person}|${Store.state.payer}】${baseName}`;
            else finalName = `【${Store.state.person}】${baseName}`; 
            let finalPrice = isInc ? -Math.abs(Math.round(inputPrice)) : Math.abs(Math.round(inputPrice));
            const newId = Date.now().toString();
            const newObj = { id: newId, date: Store.state.date, cat: Store.state.category, name: finalName, price: finalPrice };
            Store.updateExpenses([...Store.state.expenses, newObj]); 
            renderExpenses();
            nameEl.value = ''; priceEl.value = ''; priceEl.blur(); 
            showToast(`已新增${isInc ? '收入' : '花費'}`);
            try { await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'add', ...newObj }) }); fetchExpenses(); } catch (err) { showToast('同步失敗，已存於本機', 'error'); }
        }

        async function deleteExpense(id) {
            if (!confirm('確定刪除此紀錄？(後端會保留刪除日誌)')) return;
            const original = [...Store.state.expenses]; 
            Store.updateExpenses(Store.state.expenses.filter(item => String(item.id) !== String(id)));
            renderExpenses(); 
            if(document.getElementById('view-analysis').classList.contains('active')) renderAnalysis(); 
            if(document.getElementById('view-settlement').classList.contains('active')) renderSettlement();
            if(document.getElementById('view-savings').classList.contains('active')) renderSavings();
            try { await fetch(SCRIPT_URL, { method: 'POST', body: new URLSearchParams({ action: 'delete', id: String(id) }) }); showToast('紀錄已從畫面移除'); fetchExpenses(); } catch (err) { Store.updateExpenses(original); renderExpenses(); showToast('刪除失敗', 'error'); }
        }
    </script>
</body>
</html>
